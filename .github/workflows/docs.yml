name: Documentation

on:
    # Validate the docs build on every PR/push that touches docs sources — the gap
    # this closes is that docs used to build only at release time.
    pull_request:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "llms.txt"
            - ".github/workflows/docs.yml"
    push:
        branches: [main]
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "llms.txt"
            - ".github/workflows/docs.yml"
    workflow_call:
        inputs:
            deploy:
                description: "Deploy to GitHub Pages"
                required: false
                default: true
                type: boolean
    workflow_dispatch:
        inputs:
            deploy:
                description: "Deploy to GitHub Pages (only works on main branch)"
                required: false
                default: true
                type: boolean
            environment:
                description: "Target environment"
                required: false
                default: "github-pages"
                type: choice
                options:
                    - github-pages

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Validate documentation on PRs and pushes (non-strict mode)
    validate:
        name: Validate Documentation
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Install Task
              uses: arduino/setup-task@v1
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install dependencies
              run: task install

            - name: Validate documentation build
              run: task docs:validate

            - name: Upload documentation artifact (for manual runs)
              if: github.event_name == 'workflow_dispatch'
              uses: actions/upload-artifact@v4
              with:
                  name: documentation-manual-${{ github.run_number }}
                  path: ./site
                  retention-days: 7

    # Build and deploy documentation on release or manual triggers
    build-and-deploy:
        name: Build & Deploy Documentation
        # Deploy on a push to main that touched docs, or when called/dispatched with deploy=true.
        if: >-
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || inputs.deploy == true)
        needs: validate
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Install Task
              uses: arduino/setup-task@v1
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install dependencies
              run: task install

            - name: Build documentation (non-strict for deployment)
              run: task docs:validate

            - name: Upload documentation artifacts
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./site

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
