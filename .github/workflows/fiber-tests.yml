name: Fiber tests

on:
    push:
        paths:
            - "stacks/apps/fiber/**"
    pull_request:
        paths:
            - "stacks/apps/fiber/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit:
        name: Unit tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: stacks/apps/fiber/app
        steps:
            - uses: actions/checkout@v4

            - name: Set up uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true
                  python-version: "3.12"

            - name: Install dependencies
              run: uv sync

            - name: Run unit tests
              run: uv run pytest tests/unit -q

    integration:
        name: Integration tests (testcontainers)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: stacks/apps/fiber/app
        steps:
            - uses: actions/checkout@v4

            - name: Set up uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true
                  python-version: "3.12"

            - name: Install dependencies
              run: uv sync

            - name: Run integration tests
              run: FIBER_INTEGRATION=1 uv run pytest tests/integration/test_dump_runner.py tests/integration/test_movement_e2e.py -v

    e2e:
        name: Compose e2e
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run compose e2e
              run: bash stacks/apps/fiber/app/tests/e2e/run-e2e.sh
