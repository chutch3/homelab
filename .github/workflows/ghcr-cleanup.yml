name: GHCR cleanup

# Prune old per-commit (:sha) container versions that pile up from every main
# build, while KEEPING released versions (semver tags) and the :latest / :main
# moving tags. Runs weekly; manual runs default to dry-run.
#
# Requires a repo secret GHCR_PAT — a PAT with `read:packages` + `delete:packages`
# (the Actions GITHUB_TOKEN can't manage versions of user-namespace packages).

on:
    workflow_dispatch:
        inputs:
            dry_run:
                description: "List what would be deleted without deleting"
                type: boolean
                default: true
    schedule:
        - cron: "0 4 * * 1" # Mondays 04:00 UTC

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    prune:
        name: Prune old :sha versions
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.GHCR_PAT }}
            # Manual runs default to dry-run; the scheduled run actually deletes.
            DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            CUTOFF_DAYS: "14"
        steps:
            - name: Prune
              run: |
                  set -euo pipefail
                  images="warden fiber kolibri-oidc takeout-manager takeout-worker iperf3-server iperf3-exporter homelab-devbox"
                  cutoff=$(date -u -d "-${CUTOFF_DAYS} days" +%s)
                  for pkg in $images; do
                      echo "== $pkg =="
                      # Delete versions that are NOT a release (no semver/latest/main tag)
                      # and are older than the cutoff — i.e. stale :sha builds.
                      ids=$(gh api --paginate "/user/packages/container/${pkg}/versions" \
                          | jq -r --argjson cutoff "$cutoff" '
                              .[]
                              | select(((.metadata.container.tags // [])
                                        | any(. == "latest" or . == "main"
                                              or test("^[0-9]+\\.[0-9]+\\.[0-9]+"))) | not)
                              | select((.created_at | fromdateiso8601) < $cutoff)
                              | .id' || true)
                      for id in $ids; do
                          if [ "$DRY_RUN" = "true" ]; then
                              echo "  [dry-run] would delete version $id"
                          else
                              gh api -X DELETE "/user/packages/container/${pkg}/versions/${id}" --silent \
                                  && echo "  deleted version $id" || echo "  failed to delete $id"
                          fi
                      done
                  done
