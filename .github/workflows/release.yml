name: Release

on:
    workflow_dispatch:
    schedule:
        # Runs every Monday at 8 AM EST (1 PM UTC)
        # Note: GitHub Actions uses UTC. Adjust for DST if needed (EDT = UTC-4)
        - cron: '0 13 * * 1'

jobs:
    release:
        name: Semantic Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        outputs:
            released: ${{ steps.release.outputs.released }}
            version: ${{ steps.release.outputs.version }}
            tag: ${{ steps.release.outputs.tag }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Run Semantic Release
              id: release
              uses: python-semantic-release/python-semantic-release@v10.3.1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}

    deploy-docs:
        name: Deploy Documentation
        needs: release
        if: needs.release.outputs.released == 'true'
        uses: ./.github/workflows/docs.yml
        permissions:
            contents: read
            pages: write
            id-token: write

    promote-images:
        # Tag every built image with the release's semantic version, by promoting the
        # already-tested :<sha> image (no rebuild). One version for the whole platform.
        name: Promote images to ${{ needs.release.outputs.version }}
        needs: release
        if: needs.release.outputs.released == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
            REGISTRY_NAMESPACE: ${{ github.repository_owner }}
            VERSION: ${{ needs.release.outputs.version }}
        steps:
            - uses: actions/checkout@v4

            - name: Set up uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to ghcr.io
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Promote each image :sha -> :version
              # GITHUB_SHA is the released code (the release commit only bumps version/
              # changelog), and build.yml already pushed its :<sha> image.
              run: |
                  set -euo pipefail
                  for image in $(uv run ci images .); do
                      repo="${REGISTRY}/${REGISTRY_NAMESPACE}/${image}"
                      docker buildx imagetools create "${repo}:${GITHUB_SHA}" --tag "${repo}:${VERSION}"
                      echo "Promoted \`${repo}:${VERSION}\` (from \`:${GITHUB_SHA}\`)." >> "$GITHUB_STEP_SUMMARY"
                  done
