version: "3"

vars:
    PROJECT_NAME: homelab
    PYTHON_VERSION: "3.12"

dotenv: [".env"]

includes:
    ansible: ansible/Taskfile.yml
    status-pipeline:
        taskfile: scripts/status-pipeline/Taskfile.yml
        dir: scripts/status-pipeline

env:
    REGISTRY_NAMESPACE: $GITHUB_USERNAME

tasks:
    setup:
        desc: Bootstrap this machine — install all tools and project dependencies
        cmds:
            - bash setup.sh

    registry:login:
        desc: Login to ghcr.io using GITHUB_TOKEN from .env
        cmds:
            - echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_USERNAME}" --password-stdin

    install:
        desc: Install project dependencies
        cmds:
            - uv sync
            - uv run pre-commit install

    # App test suites (Python), via the `ci` tool. Tiers are dirs under each app's tests/.
    test:
        desc: "Run app tests — all, or one: task test -- warden"
        cmds:
            - uv run ci test {{.CLI_ARGS}}

    test:unit:
        desc: "Run the unit tier — task test:unit -- warden (omit app for all)"
        cmds:
            - uv run ci test --tier unit {{.CLI_ARGS}}

    test:integration:
        desc: "Run the integration tier — task test:integration -- fiber"
        cmds:
            - uv run ci test --tier integration {{.CLI_ARGS}}

    test:e2e:
        desc: "Run the e2e tier — task test:e2e -- fiber"
        cmds:
            - uv run ci test --tier e2e {{.CLI_ARGS}}

    test:affected:
        desc: "Run tests only for apps changed vs origin/main"
        cmds:
            - uv run ci test --affected

    test:shell:
        desc: Run the shell (bats) suites with coverage
        cmds:
            - echo "🧪 Running shell unit tests with coverage..."
            - mkdir -p coverage
            - rm -rf /tmp/bats-run-* 2>/dev/null || true
            - kcov --bash-method=DEBUG --include-pattern=scripts,stacks --exclude-pattern=/usr,/tmp,/var coverage/unit bats --jobs 1 stacks/apps/*/tests/*.bats tests/unit/scripts/*.bats
            - echo "📊 Merging coverage reports..."
            - kcov --merge coverage/merged coverage/unit
            - echo "✅ Shell tests completed [Coverage report](coverage/merged/index.html)"

    test:ci:
        desc: Run the CI tooling tests (homelab_ci / tools/ci)
        cmds:
            - uv run pytest

    # Build images locally via buildx bake (reads compose build: sections).
    build:
        desc: "Build an app's image(s) locally — task build -- warden"
        dir: stacks/apps/{{.CLI_ARGS}}
        cmds:
            - docker buildx bake --allow fs.read=* -f docker-compose.yml

    publish:
        desc: "Build & push an app's image(s) — task publish -- warden (requires registry login)"
        dir: stacks/apps/{{.CLI_ARGS}}
        cmds:
            - docker buildx bake --allow fs.read=* -f docker-compose.yml --push

    test-fast:
        desc: Run core tests with faster execution
        cmds:
            - echo "🧪 Running unit tests..."
            - bats --tap stacks/apps/*/tests/*.bats tests/unit/scripts/*.bats

    test-local:
        desc: Run local-only tests (requires Docker)
        cmds:
            - echo "🏠 Running local-only tests..."
            - scripts/run_local_tests.sh
            - echo "✅ Local tests completed"

    test-comprehensive:
        desc: Run all tests (shell + app + CI tooling + local)
        deps: ["test:shell", "test", "test:ci", "test-local"]

    test-performance:
        desc: Run performance and regression tests
        cmds:
            - echo "⚡ Running performance tests..."
            - bats tests/performance/generation_performance_test.bats
            - echo "✅ Performance tests completed"

    lint:
        desc: Run all linting checks
        deps: ["lint:shell", "lint:yaml", "lint:dockerfile", "lint:secrets", "lint:imports"]

    lint:imports:
        desc: Run import-linter on apps that define import contracts (fiber, warden)
        cmds:
            - |
                for d in stacks/apps/fiber/app stacks/apps/warden/app; do
                    echo "==> lint-imports: $d"
                    (cd "$d" && uv run lint-imports) || exit 1
                done

    lint:shell:
        desc: Run shellcheck on shell scripts
        cmds:
            - find scripts -name "*.sh" -type f -exec uv run shellcheck -x --source-path=scripts {} +

    lint:yaml:
        desc: Run yamllint on YAML files
        cmds:
            - uv run yamllint .

    lint:dockerfile:
        desc: Run hadolint on Dockerfiles (using pre-commit)
        cmds:
            - uv run pre-commit run hadolint --all-files

    lint:secrets:
        desc: Run gitleaks to check for secrets (via pre-commit)
        cmds:
            - uv run pre-commit run gitleaks --all-files

    lint:python:
        desc: Run pre-commit hooks (includes Python linting)
        cmds:
            - uv run pre-commit run --all-files

    static-analysis:
        desc: Run static analysis tools
        deps: [lint, "security-scan"]

    security-scan:
        desc: Run security scanning (via pre-commit)
        cmds:
            - uv run pre-commit run gitleaks --all-files

    format:
        desc: Format code
        cmds:
            - uv run pre-commit run --all-files

    clean:
        desc: Clean up generated files and caches
        cmds:
            - rm -rf .pytest_cache
            - rm -rf __pycache__
            - find . -name "*.pyc" -delete
            - find . -name ".bats-*" -delete

    docs:build:
        desc: Build documentation with MkDocs
        cmds:
            - uv run mkdocs build --clean --strict
        env:
            MKDOCS_ENABLE_SOCIAL: false

    docs:serve:
        desc: Serve documentation locally with live reload
        cmds:
            - uv run mkdocs serve --dev-addr=0.0.0.0:{{.PORT}}
        vars:
            PORT: "{{ .PORT | default 8000 }}"

    docs:validate:
        desc: Validate documentation build and check for issues
        cmds:
            - uv run mkdocs build --clean
            - echo "✅ Documentation builds successfully"
        env:
            MKDOCS_ENABLE_SOCIAL: false

    docs:validate-strict:
        desc: Validate documentation build with strict mode (fails on warnings)
        cmds:
            - uv run mkdocs build --clean --strict
            - echo "✅ Documentation builds successfully with no warnings"
        env:
            MKDOCS_ENABLE_SOCIAL: false

    docs:generate:
        desc: Auto-generate per-stack API docs (architecture diagrams, env vars, volumes)
        preconditions:
            - sh: command -v dockumentor
              msg: "dockumentor not found. Install with: uv tool install dockumentor"
        cmds:
            - ./scripts/dev/generate-stack-docs.sh

    secrets:login:
        desc: Login and unlock the configured secret vault
        cmds:
            - task: ansible:secrets:login

    secrets:pull:
        desc: Restore .env from the configured secret provider
        cmds:
            - task: ansible:secrets:pull

    secrets:push:
        desc: Sync local .env to the configured secret provider
        cmds:
            - task: ansible:secrets:push

    secrets:wipe:
        desc: "DESTRUCTIVE: Securely remove the local .env file"
        cmds:
            - task: ansible:secrets:wipe

    check:
        desc: Run all checks (lint, tests, static analysis, docs)
        deps: [lint, "test:shell", "test", "test:ci", "static-analysis", "docs:validate"]

    release:version:
        desc: Check what the next version would be
        cmds:
            - uv run semantic-release version --print

    release:
        desc: Run semantic release (determines if release needed and executes)
        cmds:
            - git config --global user.name "github-actions[bot]"
            - git config --global user.email "github-actions[bot]@users.noreply.github.com"
            - uv run semantic-release version --skip-build

    release:update-lock:
        desc: Update uv lock file after release
        cmds:
            - uv lock
            - |
                if [ -n "$(git diff --name-only)" ]; then
                  git add uv.lock
                  git commit -m "chore: update uv.lock after release"
                  echo "uv lock file updated and committed"
                else
                  echo "uv lock file is already up to date"
                fi

    help:
        desc: Show available tasks
        cmds:
            - task --list

    # Combined: Full deployment
    deploy:full:
        desc: Full deployment (bootstrap + deploy apps)
        cmds:
            - task: ansible:bootstrap
            - task: ansible:deploy
