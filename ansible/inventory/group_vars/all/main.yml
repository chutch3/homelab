# ansible/inventory/group_vars/all/main.yml
---
# Common variables for all hosts
# Safe to commit - no secrets!

# Domain configuration
base_domain: "{{ lookup('env', 'BASE_DOMAIN') }}"

# Bootstrap configuration
bootstrap_state_dir: /var/lib/homelab
bootstrap_version: "1.0.0"

# Packages installed on every node during bootstrap.
# Add a package here to install it. Feature roles gate on their key package
# being present (e.g. 'snmpd' in packages enables SNMP configuration).
packages:
    - apt-transport-https
    - ca-certificates
    - curl
    - gnupg
    - lsb-release
    - software-properties-common
    - python3
    - python3-pip
    - jq
    - wget
    - git
    - vim
    - htop
    - net-tools
    - snmpd
    - snmp

# Docker configuration
docker_users:
    - "{{ ansible_user }}"
# Pin Docker version across all nodes to prevent version skew in Swarm
# Format: major.minor.patch (e.g. 29.1.4). Leave empty to install latest.
docker_version: "29.1.4"

# CIFS configuration
cifs_packages:
    - cifs-utils
    - nfs-common

# iSCSI configuration - shared block storage for Docker volumes
iscsi_enabled: "{{ lookup('env', 'ISCSI_ENABLED') | default('false') | bool }}"
iscsi_target_ip: "{{ lookup('env', 'NAS_IP') | default('192.168.86.189', true) }}"
iscsi_target_port: "{{ lookup('env', 'ISCSI_TARGET_PORT') | default('3260', true) | int }}"
iscsi_target_iqn: "{{ lookup('env', 'ISCSI_TARGET_IQN') }}"
iscsi_mount_path: "{{ lookup('env', 'ISCSI_MOUNT_PATH') | default('/mnt/iscsi/media-apps', true) }}"

# Second iSCSI mount for app-data
iscsi_app_data_enabled: "{{ lookup('env', 'ISCSI_APP_DATA_ENABLED') | default('false') | bool }}"
iscsi_app_data_iqn: "{{ lookup('env', 'ISCSI_APP_DATA_IQN') }}"
iscsi_app_data_mount_path: "{{ lookup('env', 'ISCSI_APP_DATA_MOUNT_PATH') | default('/mnt/iscsi/app-data', true) }}"

# Third iSCSI mount for cache storage
iscsi_cache_enabled: "{{ lookup('env', 'ISCSI_CACHE_ENABLED') | default('false') | bool }}"
iscsi_cache_iqn: "{{ lookup('env', 'ISCSI_CACHE_IQN') }}"
iscsi_cache_mount_path: "{{ lookup('env', 'ISCSI_CACHE_MOUNT_PATH') | default('/mnt/iscsi/cache', true) }}"

# DNS configuration
# primary_dns_managed=true: this repo deploys and manages the DNS server (stacks/dns)
# primary_dns_managed=false: bring your own DNS server (set PRIMARY_DNS_HOST)
primary_dns_type: "{{ lookup('env', 'PRIMARY_DNS_TYPE') | default('technitium', true) }}"
primary_dns_managed: "{{ lookup('env', 'PRIMARY_DNS_MANAGED') | default('true', true) | bool }}"
primary_dns_host: "{{ lookup('env', 'PRIMARY_DNS_HOST') | default(hostvars[groups['managers'][0]]['ansible_host'], true) }}"
primary_dns_api_key: "{{ lookup('env', 'PRIMARY_DNS_API_KEY') | default('') }}"

# Derived API base URL — used by adapters and readiness checks
dns_primary_api_url: "{{ 'http://' ~ primary_dns_host ~ ':5380/api' if primary_dns_type == 'technitium' else 'http://' ~ primary_dns_host ~ '/api' }}"

# Upstreams for the base-domain Conditional Forwarder zone: local records
# override, anything unmatched forwards here so public-only records (DKIM,
# SPF, DMARC, relay CNAMEs) stay visible on the LAN. Reuses the same
# upstreams as the Technitium server itself (DNS_SERVER_FORWARDERS).
dns_zone_forwarders: "{{ (lookup('env', 'DNS_SERVER_FORWARDERS') | default('1.1.1.1,1.0.0.1', true)).split(',') }}"

# Secondary DNS configuration
# Set SECONDARY_DNS_ENABLED=true and provide SECONDARY_DNS_HOST + SECONDARY_DNS_API_KEY to sync records
secondary_dns_enabled: "{{ lookup('env', 'SECONDARY_DNS_ENABLED') | default('false') | bool }}"
secondary_dns_type: "{{ lookup('env', 'SECONDARY_DNS_TYPE') | default('pihole', true) }}"
secondary_dns_host: "{{ lookup('env', 'SECONDARY_DNS_HOST') | default('') }}"
secondary_dns_api_key: "{{ lookup('env', 'SECONDARY_DNS_API_KEY') | default('') }}"

# Derived secondary API base URL
dns_secondary_api_url: "http://{{ secondary_dns_host }}/api"

# Uptime Kuma configuration
uptime_kuma_api_url: "https://uptime.{{ lookup('env', 'BASE_DOMAIN') }}"
uptime_kuma_username: "{{ lookup('env', 'UPTIME_KUMA_USERNAME') | default('admin', true) }}"

# Firewall configuration (Commented out as per user's request)
# firewall_allowed_ports:
#   - { port: 22, proto: tcp, comment: 'SSH' }
#   - { port: 80, proto: tcp, comment: 'HTTP' }
#   - { port: 443, proto: tcp, comment: 'HTTPS' }
#   - { port: 2377, proto: tcp, comment: 'Docker Swarm management' }
#   - { port: 7946, proto: tcp, comment: 'Docker Swarm communication' }
#   - { port: 7946, proto: udp, comment: 'Docker Swarm communication' }
#   - { port: 4789, proto: udp, comment: 'Docker overlay network' }
#   - { port: "{{ node_exporter_port }}", proto: tcp, comment: 'Node Exporter' }

# SSH policy (key paths live in group_vars/all/ssh.yml - gitignored)
ssh_disable_password_auth: false
ssh_pubkey_authentication: true

# Tailscale VPN (optional — set TAILSCALE_ENABLED=true in .env to activate)
# Each node gets its own Tailscale IP (100.x.x.x). No subnet routes are
# advertised by default so only cluster nodes are reachable, not your entire LAN.
# When OPNsense arrives, transfer subnet routing there via its Tailscale plugin
# and leave these node configs unchanged.
tailscale_enabled: "{{ lookup('env', 'TAILSCALE_ENABLED') | default('false') | bool }}"
tailscale_auth_key: "{{ lookup('env', 'TAILSCALE_AUTH_KEY') | default('') }}"
tailscale_hostname: "{{ inventory_hostname }}"
# Comma-separated CIDRs to advertise (empty = node-only, no LAN exposure)
tailscale_advertise_routes: "{{ lookup('env', 'TAILSCALE_ADVERTISE_ROUTES') | default('') | split(',') | select() | list }}"
# ACL tags — must be pre-authorized in Tailscale admin → Keys before first run.
# tag:homelab-server  : all cluster nodes
# tag:homelab-router  : reserved for OPNsense when it arrives
tailscale_tags:
    - tag:homelab-server
# Health check cron settings
tailscale_health_check_log: /var/log/tailscale-health.log
tailscale_health_check_interval_minutes: 5

# Secret Management (Sync & Restore)
# Supported providers: bitwarden
secret_provider: "{{ lookup('env', 'SECRET_PROVIDER') | default('bitwarden', true) }}"
secret_vault_item: "{{ lookup('env', 'SECRET_VAULT_ITEM') | default('Homelab Secrets', true) }}"

# Swarm overlay networks that must exist before any stack is deployed.
# Add an entry here to have ensure-networks.yml create it automatically.
swarm_required_networks:
    - traefik-public
    - backups
