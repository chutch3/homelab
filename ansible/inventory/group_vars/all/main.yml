# ansible/inventory/group_vars/all/main.yml
---
# Common variables for all hosts
# Safe to commit - no secrets!

# Domain configuration
base_domain: "{{ lookup('env', 'BASE_DOMAIN') }}"

# Bootstrap configuration
bootstrap_state_dir: /var/lib/homelab
bootstrap_version: "1.0.0"

# Docker configuration
docker_users:
    - "{{ ansible_user }}"
# Pin Docker version across all nodes to prevent version skew in Swarm
# Format: major.minor.patch (e.g. 29.1.4). Leave empty to install latest.
docker_version: "29.1.4"

# CIFS configuration
cifs_packages:
    - cifs-utils
    - nfs-common

# iSCSI configuration - shared block storage for Docker volumes
iscsi_enabled: "{{ lookup('env', 'ISCSI_ENABLED') | default('false') | bool }}"
iscsi_target_ip: "{{ lookup('env', 'NAS_IP') | default('192.168.86.189') }}"
iscsi_target_port: "{{ lookup('env', 'ISCSI_TARGET_PORT') | default('3260') | int }}"
iscsi_target_iqn: "{{ lookup('env', 'ISCSI_TARGET_IQN') }}"
iscsi_mount_path: "{{ lookup('env', 'ISCSI_MOUNT_PATH') | default('/mnt/iscsi/media-apps') }}"

# Second iSCSI mount for app-data
iscsi_app_data_enabled: "{{ lookup('env', 'ISCSI_APP_DATA_ENABLED') | default('false') | bool }}"
iscsi_app_data_iqn: "{{ lookup('env', 'ISCSI_APP_DATA_IQN') }}"
iscsi_app_data_mount_path: "{{ lookup('env', 'ISCSI_APP_DATA_MOUNT_PATH') | default('/mnt/iscsi/app-data') }}"

# Third iSCSI mount for cache storage
iscsi_cache_enabled: "{{ lookup('env', 'ISCSI_CACHE_ENABLED') | default('false') | bool }}"
iscsi_cache_iqn: "{{ lookup('env', 'ISCSI_CACHE_IQN') }}"
iscsi_cache_mount_path: "{{ lookup('env', 'ISCSI_CACHE_MOUNT_PATH') | default('/mnt/iscsi/cache') }}"

# DNS configuration
# primary_dns_managed=true: this repo deploys and manages the DNS server (stacks/dns)
# primary_dns_managed=false: bring your own DNS server (set PRIMARY_DNS_HOST)
primary_dns_type: "{{ lookup('env', 'PRIMARY_DNS_TYPE') | default('technitium') }}"
primary_dns_managed: "{{ lookup('env', 'PRIMARY_DNS_MANAGED') | default('true') | bool }}"
primary_dns_host: "{{ lookup('env', 'PRIMARY_DNS_HOST') | default(hostvars[groups['managers'][0]]['ansible_host'], true) }}"
primary_dns_api_key: "{{ lookup('env', 'PRIMARY_DNS_API_KEY') | default('') }}"

# Derived API base URL — used by adapters and readiness checks
dns_primary_api_url: >-
  {{ 'http://' ~ primary_dns_host ~ ':5380/api'
     if primary_dns_type == 'technitium'
     else 'http://' ~ primary_dns_host ~ '/api' }}

# Secondary DNS configuration
# Set SECONDARY_DNS_ENABLED=true and provide SECONDARY_DNS_HOST + SECONDARY_DNS_API_KEY to sync records
secondary_dns_enabled: "{{ lookup('env', 'SECONDARY_DNS_ENABLED') | default('false') | bool }}"
secondary_dns_type: "{{ lookup('env', 'SECONDARY_DNS_TYPE') | default('pihole') }}"
secondary_dns_host: "{{ lookup('env', 'SECONDARY_DNS_HOST') | default('') }}"
secondary_dns_api_key: "{{ lookup('env', 'SECONDARY_DNS_API_KEY') | default('') }}"

# Derived secondary API base URL
dns_secondary_api_url: "http://{{ secondary_dns_host }}/api"

# Uptime Kuma configuration
uptime_kuma_api_url: "https://uptime.{{ lookup('env', 'BASE_DOMAIN') }}"
uptime_kuma_username: "{{ lookup('env', 'UPTIME_KUMA_USERNAME') | default('admin', true) }}"

# Firewall configuration (Commented out as per user's request)
# firewall_allowed_ports:
#   - { port: 22, proto: tcp, comment: 'SSH' }
#   - { port: 80, proto: tcp, comment: 'HTTP' }
#   - { port: 443, proto: tcp, comment: 'HTTPS' }
#   - { port: 2377, proto: tcp, comment: 'Docker Swarm management' }
#   - { port: 7946, proto: tcp, comment: 'Docker Swarm communication' }
#   - { port: 7946, proto: udp, comment: 'Docker Swarm communication' }
#   - { port: 4789, proto: udp, comment: 'Docker overlay network' }
#   - { port: "{{ node_exporter_port }}", proto: tcp, comment: 'Node Exporter' }

# SSH policy (key paths live in group_vars/all/ssh.yml - gitignored)
ssh_disable_password_auth: false
ssh_pubkey_authentication: true
