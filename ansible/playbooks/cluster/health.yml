# ansible/playbooks/cluster/health.yml
# Read-only cluster health check — surfaces degraded services and gossip instability.
# Run after an unexpected recovery, before a maintenance window, or as a routine check.
#
# Checks:
#   - Node availability states (ready/active vs down/drain)
#   - Services with degraded replica counts
#   - DNS service crash history and recent failures
#   - Docker gossip instability in the last hour (indicator of DNS-triggered cascade)
#
# Usage:
#   task ansible:cluster:health
---
- name: Cluster health check
  hosts: managers
  gather_facts: false

  tasks:
    - name: Get all Swarm node states
      ansible.builtin.command: >
        docker node ls
        --format "{{ '{{' }}.Hostname{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Availability{{ '}}' }}"
      register: health_node_states
      changed_when: false
      run_once: true

    - name: Check for services with degraded replica counts
      ansible.builtin.shell: |
        docker service ls --format "{{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Replicas{{ '}}' }}" \
          | awk -F'\t' 'BEGIN{found=0} {split($2,a,"/"); if(a[1]!=a[2]){print "  ⚠ "$1": "$2; found=1}} END{if(!found) print "  ✓ All services at desired replica count"}'
      register: health_degraded
      changed_when: false
      failed_when: false
      run_once: true

    - name: Get DNS service task history
      ansible.builtin.command: >
        docker service ps dns_dns-server --no-trunc
        --format "{{ '{{' }}.CurrentState{{ '}}' }}\t{{ '{{' }}.Error{{ '}}' }}"
      register: health_dns_history
      changed_when: false
      run_once: true

    - name: Count DNS failures in task history
      ansible.builtin.shell: >
        docker service ps dns_dns-server --no-trunc
        --format "{{ '{{' }}.CurrentState{{ '}}' }}"
        | grep -c "Failed" || true
      register: health_dns_failures
      changed_when: false
      run_once: true

    - name: Check Docker daemon for gossip instability in the last hour
      ansible.builtin.shell: >
        journalctl -u docker --since "1 hour ago" --no-pager -q
        | grep -cE "memberlist.*(failed|suspect|Marking)|NetworkDB.*healthscore|connectivity issues" || true
      register: health_gossip_count
      changed_when: false
      failed_when: false
      run_once: true

    - name: "CLUSTER HEALTH REPORT ── Nodes (hostname / status / availability)"
      ansible.builtin.debug:
        var: health_node_states.stdout_lines
      run_once: true

    - name: "CLUSTER HEALTH REPORT ── Service Replicas"
      ansible.builtin.debug:
        var: health_degraded.stdout_lines
      run_once: true

    - name: "CLUSTER HEALTH REPORT ── DNS Crash History: {{ health_dns_failures.stdout | trim ~ ' failure(s) recorded' }}"
      ansible.builtin.debug:
        var: health_dns_history.stdout_lines
      run_once: true

    - name: "CLUSTER HEALTH REPORT ── Gossip Stability (last 1h)"
      ansible.builtin.debug:
        msg: >-
          {{ '⚠ ' + (health_gossip_count.stdout | trim) + ' instability event(s) — run: journalctl -u docker --since "1 hour ago" | grep memberlist'
             if (health_gossip_count.stdout | trim | int) > 0
             else '✓ No gossip instability detected' }}
      run_once: true
