---
# ansible/playbooks/cluster/teardown.yml
# Scorched-earth teardown with full verification
# This playbook completely destroys the Docker Swarm cluster and all resources

- name: Comprehensive Docker Swarm cluster teardown
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    # Confirmation required to prevent accidents
    confirm_teardown: false
    # Remove volumes (default: false for safety)
    remove_volumes: false
    # Force nodes to leave swarm (default: true)
    leave_swarm: true

  tasks:
    # =========================================================================
    # PHASE 0: Safety Check
    # =========================================================================
    - name: Require explicit confirmation
      ansible.builtin.fail:
        msg: |
          ⚠️  DANGER: This will destroy the entire cluster!
          To proceed, run with: -e "confirm_teardown=true"
      when: not (confirm_teardown | bool)
      run_once: true

    - name: Display teardown plan
      ansible.builtin.debug:
        msg: |
          🔥 TEARDOWN PLAN:
          ================
          Phase 1: Remove all Docker Swarm stacks
          Phase 2: Remove orphaned containers
          Phase 3: Remove overlay networks (with VIP release)
          Phase 4: Remove volumes ({{ 'ENABLED' if remove_volumes else 'DISABLED' }})
          Phase 5: Unmount OCFS2 filesystems
          Phase 6: Logout from iSCSI sessions
          Phase 7: Clean /etc/fstab entries
          Phase 8: Force nodes to leave swarm ({{ 'ENABLED' if leave_swarm else 'DISABLED' }})
          Phase 9: Verification and reporting
      run_once: true

    # =========================================================================
    # PHASE 1: Remove Docker Swarm Stacks
    # =========================================================================
    - name: "[PHASE 1] Get list of all running stacks"
      community.docker.docker_stack_info:
      register: current_stacks
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true

    - name: "[PHASE 1] Display stacks to be removed"
      ansible.builtin.debug:
        msg: "Found {{ current_stacks.results | length }} stack(s): {{ current_stacks.results | map(attribute='Name') | list | join(', ') }}"
      run_once: true
      when: current_stacks.results | length > 0

    - name: "[PHASE 1] Stop and remove Docker Swarm stacks"
      community.docker.docker_stack:
        state: absent
        name: "{{ item.Name }}"
      loop: "{{ current_stacks.results }}"
      when: current_stacks.results | length > 0
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true
      register: stack_removal

    - name: "[PHASE 1] Wait for stacks to be fully removed"
      ansible.builtin.pause:
        seconds: 10
      when: current_stacks.results | length > 0

    - name: "[PHASE 1] Verify all stacks removed"
      community.docker.docker_stack_info:
      register: remaining_stacks
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true
      until: remaining_stacks.results | length == 0
      retries: 10
      delay: 3
      failed_when: false
      when: not ansible_check_mode

    - name: "[PHASE 1] Report stack removal status"
      ansible.builtin.debug:
        msg: "{{ '✓ All stacks removed' if (remaining_stacks is defined and remaining_stacks.results | length == 0) else ('ℹ Check mode - verification skipped' if ansible_check_mode else '⚠ WARNING: ' + (remaining_stacks.results | length | string) + ' stack(s) still present') }}"
      run_once: true

    # =========================================================================
    # PHASE 2: Remove Orphaned Containers
    # =========================================================================
    - name: "[PHASE 2] Get list of all containers (including stopped)"
      community.docker.docker_host_info:
        containers: yes
      register: all_containers

    - name: "[PHASE 2] Filter orphaned containers"
      ansible.builtin.set_fact:
        orphaned_containers: "{{ all_containers.containers | rejectattr('Status', 'match', '^Up') | map(attribute='Id') | list }}"

    - name: "[PHASE 2] Display orphaned containers"
      ansible.builtin.debug:
        msg: "Found {{ orphaned_containers | length }} orphaned container(s)"

    - name: "[PHASE 2] Remove orphaned containers"
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
        force_kill: yes
      loop: "{{ orphaned_containers }}"
      when: orphaned_containers | length > 0
      register: container_removal

    - name: "[PHASE 2] Verify containers removed"
      community.docker.docker_host_info:
        containers: yes
      register: verify_containers

    - name: "[PHASE 2] Report container removal status"
      ansible.builtin.debug:
        msg: "✓ Removed {{ orphaned_containers | length }} orphaned container(s)"
      when: orphaned_containers | length > 0

    # =========================================================================
    # PHASE 3: Remove Overlay Networks (with VIP release logic)
    # =========================================================================
    - name: "[PHASE 3] Get all overlay networks"
      community.docker.docker_host_info:
        networks: yes
      register: all_networks
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true

    - name: "[PHASE 3] Filter custom overlay networks"
      ansible.builtin.set_fact:
        custom_overlays: "{{ all_networks.networks | selectattr('Driver', 'equalto', 'overlay') | rejectattr('Name', 'in', ['ingress', 'docker_gwbridge']) | list }}"
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true

    - name: "[PHASE 3] Display networks to be removed"
      ansible.builtin.debug:
        msg: "Found {{ custom_overlays | length }} custom overlay network(s): {{ custom_overlays | map(attribute='Name') | list | join(', ') }}"
      run_once: true

    - name: "[PHASE 3] Remove custom overlay networks (with retry for VIP release)"
      community.docker.docker_network:
        name: "{{ item.Name }}"
        state: absent
        force: yes
      loop: "{{ custom_overlays }}"
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true
      register: network_removal
      until: network_removal is succeeded
      retries: 5
      delay: 3
      failed_when: false

    - name: "[PHASE 3] Wait for VIP release"
      ansible.builtin.pause:
        seconds: 5
      when: custom_overlays | length > 0

    - name: "[PHASE 3] Verify networks removed"
      community.docker.docker_host_info:
        networks: yes
      register: remaining_networks
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true

    - name: "[PHASE 3] Check for remaining custom overlays"
      ansible.builtin.set_fact:
        remaining_overlays: "{{ remaining_networks.networks | selectattr('Driver', 'equalto', 'overlay') | rejectattr('Name', 'in', ['ingress', 'docker_gwbridge']) | list }}"
      delegate_to: "{{ groups['managers'][0] }}"
      run_once: true

    - name: "[PHASE 3] Report network removal status"
      ansible.builtin.debug:
        msg: "{{ '✓ All custom overlay networks removed' if remaining_overlays | length == 0 else '⚠ WARNING: ' + (remaining_overlays | length | string) + ' network(s) still present' }}"
      run_once: true

    # =========================================================================
    # PHASE 4: Remove Volumes (Optional)
    # =========================================================================
    - name: "[PHASE 4] Get list of all Docker volumes"
      community.docker.docker_host_info:
        volumes: yes
      register: all_volumes
      when: remove_volumes | bool

    - name: "[PHASE 4] Display volumes to be removed"
      ansible.builtin.debug:
        msg: "Found {{ all_volumes.volumes | length }} volume(s)"
      when:
        - remove_volumes | bool
        - all_volumes.volumes | length > 0

    - name: "[PHASE 4] Remove all Docker volumes"
      community.docker.docker_volume:
        name: "{{ item.Name }}"
        state: absent
        force: yes
      loop: "{{ all_volumes.volumes }}"
      when:
        - remove_volumes | bool
        - all_volumes.volumes | length > 0
      register: volume_removal
      failed_when: false

    - name: "[PHASE 4] Verify volumes removed"
      community.docker.docker_host_info:
        volumes: yes
      register: remaining_volumes
      when: remove_volumes | bool

    - name: "[PHASE 4] Report volume removal status"
      ansible.builtin.debug:
        msg: |
          {% if remove_volumes | bool %}
          {{ '✓ All volumes removed' if remaining_volumes.volumes | length == 0 else '⚠ WARNING: ' + (remaining_volumes.volumes | length | string) + ' volume(s) still present' }}
          {% else %}
          ℹ Volume removal disabled (use -e "remove_volumes=true")
          {% endif %}

    # =========================================================================
    # PHASE 5: Unmount OCFS2 Filesystems
    # =========================================================================
    - name: "[PHASE 5] Include iSCSI unmount tasks"
      ansible.builtin.include_role:
        name: storage
        tasks_from: iscsi-unmount
      when: iscsi_enabled | default(false)

    # =========================================================================
    # PHASE 6: Force Nodes to Leave Swarm
    # =========================================================================
    - name: "[PHASE 6] Get current swarm state"
      community.docker.docker_swarm_info:
      register: swarm_state_before
      when: leave_swarm | bool
      failed_when: false
      ignore_errors: yes

    - name: "[PHASE 6] Display swarm state"
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} swarm state: {{ 'active' if swarm_state_before.docker_swarm_active else 'inactive' }}"
      when: leave_swarm | bool

    - name: "[PHASE 6] Force nodes to leave swarm"
      community.docker.docker_swarm:
        state: absent
        force: yes
      when:
        - leave_swarm | bool
        - swarm_state_before is defined
        - swarm_state_before.docker_swarm_active | default(true)
      register: swarm_leave
      failed_when: false
      ignore_errors: yes

    - name: "[PHASE 6] Verify nodes left swarm"
      community.docker.docker_swarm_info:
      register: swarm_state_after
      when:
        - leave_swarm | bool
        - not ansible_check_mode
      until: not swarm_state_after.docker_swarm_active | default(false)
      retries: 5
      delay: 2
      failed_when: false
      ignore_errors: yes

    - name: "[PHASE 6] Report swarm leave status"
      ansible.builtin.debug:
        msg: "{{ '✓ Node left swarm' if (swarm_state_after is defined and not swarm_state_after.docker_swarm_active | default(false)) else ('ℹ Check mode - skipped' if ansible_check_mode else 'ℹ Swarm leave attempted (verification skipped - Docker SDK may not be installed)') }}"
      when: leave_swarm | bool

    # =========================================================================
    # PHASE 7: Final Verification & Reporting
    # =========================================================================
    - name: "[PHASE 7] Gather final state"
      community.docker.docker_host_info:
        containers: yes
        volumes: yes
        networks: yes
      register: final_state
      failed_when: false
      ignore_errors: yes

    - name: "[PHASE 7] Display teardown summary"
      ansible.builtin.debug:
        msg: |

          ╔══════════════════════════════════════════════════════════════╗
          ║          TEARDOWN COMPLETE - {{ inventory_hostname | upper }}
          ╚══════════════════════════════════════════════════════════════╝

          Stacks:       {{ '✓ All removed' if remaining_stacks is defined and remaining_stacks.results | default([]) | length == 0 else ('ℹ Skipped' if ansible_check_mode else '⚠ ' + (remaining_stacks.results | default([]) | length | string) + ' remain') }}
          Containers:   {{ final_state.containers | default([]) | length if final_state is defined and final_state.containers is defined else 'N/A' }} remaining
          Networks:     {{ final_state.networks | default([]) | length if final_state is defined and final_state.networks is defined else 'N/A' }} remaining
          Volumes:      {{ final_state.volumes | default([]) | length if final_state is defined and final_state.volumes is defined else 'N/A' }} remaining
          Swarm:        {{ '✓ Left' if (swarm_state_after is defined and not swarm_state_after.docker_swarm_active | default(false)) else ('ℹ Skipped' if ansible_check_mode else '⚠ Unknown') }}
          iSCSI/OCFS2:  {{ '✓ Unmounted' if iscsi_enabled | default(false) else 'N/A' }}

          {% if ansible_check_mode %}
          ℹ️  Check mode - no actual changes made
          {% elif remaining_stacks is defined and remaining_stacks.results | default([]) | length > 0 or
                remaining_overlays | default([]) | length > 0 or
                (remove_volumes and remaining_volumes is defined and remaining_volumes.volumes | default([]) | length > 0) or
                (leave_swarm and swarm_state_after is defined and swarm_state_after.docker_swarm_active | default(false)) %}
          ⚠️  WARNINGS: Some resources could not be removed
          {% else %}
          ✅ All requested resources successfully removed
          {% endif %}
      run_once: true
      delegate_to: localhost

    - name: "[PHASE 7] Create teardown report"
      ansible.builtin.copy:
        content: |
          Homelab Cluster Teardown Report
          Generated: {{ ansible_date_time.iso8601 }}

          Stacks Removed: {{ current_stacks.results | default([]) | length }}
          Containers Removed: {{ orphaned_containers | default([]) | length }}
          Networks Removed: {{ custom_overlays | default([]) | length }}
          Volumes Removed: {{ all_volumes.volumes | default([]) | length if remove_volumes else 0 }}
          Nodes Left Swarm: {{ ansible_play_hosts | length if leave_swarm else 0 }}

          Remaining Resources:
          - Stacks: {{ remaining_stacks.results | default([]) | length }}
          - Overlay Networks: {{ remaining_overlays | default([]) | length }}
          - Volumes: {{ remaining_volumes.volumes | default([]) | length if remove_volumes else 'N/A (not removed)' }}
        dest: "/tmp/teardown-report-{{ ansible_date_time.epoch }}.txt"
        mode: '0644'
      delegate_to: localhost
      run_once: true
