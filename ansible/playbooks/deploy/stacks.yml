# ansible/playbooks/deploy/stacks.yml
---
- name: Deploy all Docker Swarm stacks
  hosts: managers
  tags: [deploy]
  vars:
    # If set, only deploy these specific apps (comma-separated list)
    only_apps: ""
    # If set, skip these specific apps (comma-separated list)
    skip_apps: ""
    # If true, skip infrastructure stacks (monitoring, reverse-proxy, dns)
    skip_infrastructure: false
    # Path to the base directory containing app stacks
    stacks_base_path: "stacks"
    base_domain: "{{ lookup('env', 'BASE_DOMAIN') }}"

  tasks:
    - name: Verify Docker Swarm is active
      community.docker.docker_swarm_info:
      register: swarm_info
      failed_when: not swarm_info.docker_swarm_active
      run_once: true

    - name: Get list of stack directories
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/../../../{{ stacks_base_path }}/apps"
        file_type: directory
      delegate_to: localhost
      register: app_stack_dirs

    - name: Get list of infrastructure stack directories
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/../../../{{ stacks_base_path }}"
        file_type: directory
        patterns: ["monitoring", "reverse-proxy", "dns"]
      delegate_to: localhost
      register: infra_stack_dirs

    - name: Exclude unmanaged dns stack from infrastructure
      ansible.builtin.set_fact:
        infra_stack_dirs:
          files: "{{ infra_stack_dirs.files | rejectattr('path', 'search', '/dns$') | list }}"
      when: not primary_dns_managed | bool

    - name: Prepare list of stacks to deploy
      ansible.builtin.set_fact:
        all_stacks: "{{ (infra_stack_dirs.files | map(attribute='path') | list) + (app_stack_dirs.files | map(attribute='path') | list) }}"

    - name: Filter stacks based on only_apps
      ansible.builtin.set_fact:
        filtered_stacks: "{{ all_stacks }}"
      when: only_apps == ''

    - name: Initialize filtered_stacks for only_apps mode
      ansible.builtin.set_fact:
        filtered_stacks: []
      when: only_apps != ''

    - name: Filter to only specified apps
      ansible.builtin.set_fact:
        filtered_stacks: "{{ filtered_stacks + (all_stacks | select('match', '.*/' + item.strip() + '$') | list) }}"
      loop: "{{ only_apps.split(',') }}"
      when: only_apps != ''

    - name: Exclude skipped apps
      ansible.builtin.set_fact:
        filtered_stacks: >-
          {{ filtered_stacks | reject('match', '.*/' + item.strip() + '$') | list }}
      loop: "{{ skip_apps.split(',') }}"
      when: skip_apps != ''

    - name: Exclude infrastructure stacks if requested
      ansible.builtin.set_fact:
        filtered_stacks: >-
          {{ filtered_stacks |
             reject('match', '.*/monitoring$') |
             reject('match', '.*/reverse-proxy$') |
             reject('match', '.*/dns$') | list }}
      when: skip_infrastructure | default(false) | bool

    - name: Load .env file
      ansible.builtin.include_role:
        name: swarm
        tasks_from: load-env

    - name: Ensure required overlay networks exist
      ansible.builtin.include_role:
        name: swarm
        tasks_from: ensure-networks

    - name: Deploy Docker stack
      community.docker.docker_stack:
        state: present
        name: "{{ item.split('/')[-1] }}"
        compose:
          - "{{ item }}/docker-compose.yml"
      environment: "{{ swarm_env_vars }}"
      loop: "{{ filtered_stacks }}"
      register: deploy_results

    - name: Report deployment status
      ansible.builtin.debug:
        msg: "Stack {{ item.item.split('/')[-1] }} deployment {{ 'succeeded' if item.changed or not item.failed else 'failed' }}"
      loop: "{{ deploy_results.results }}"

    - name: Get DNS API token
      ansible.builtin.include_role:
        name: dns
        tasks_from: get-token

    - name: Get Pi-hole API token
      ansible.builtin.include_role:
        name: dns
        tasks_from: get-pihole-token
      when: secondary_dns_enabled | default(false) | bool
      ignore_errors: yes

    - name: Register DNS records for all services
      ansible.builtin.include_role:
        name: dns
        tasks_from: add-service-cnames

    - name: Get Uptime Kuma API token
      ansible.builtin.include_role:
        name: uptime_kuma
        tasks_from: get-token

    - name: Register Uptime Kuma monitors for all services
      ansible.builtin.include_role:
        name: uptime_kuma
        tasks_from: add-service-monitors
