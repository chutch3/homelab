---
# ansible/playbooks/secrets.yml
# Entry point for secret sync and restore operations

- name: Secrets Orchestration
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Operation can be 'push' or 'pull'
    secret_action: "{{ secret_op | default('pull') }}"

  tasks:
    - name: Ensure secret_action is valid
      ansible.builtin.fail:
        msg: "The 'action' variable must be 'install', 'push', or 'pull'."
      when: secret_action not in ['install', 'push', 'pull']

    - name: Execute secret action
      ansible.builtin.include_role:
        name: secrets
        tasks_from: "{{ secret_action }}.yml"
