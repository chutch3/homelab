# ansible/roles/common/tasks/main.yml
---
- name: Update apt cache
  apt:
      update_cache: yes
      cache_valid_time: 3600
  changed_when: false

- name: Install packages
  apt:
      name: "{{ packages }}"
      state: present

- name: Set timezone
  community.general.timezone:
      name: "{{ timezone | default('UTC') }}"
  notify: restart cron

- name: Ensure required directories exist
  file:
      path: "{{ item }}"
      state: directory
      mode: "0755"
  loop:
      - /opt/homelab
      - /var/log/homelab
      - "{{ bootstrap_state_dir }}"
