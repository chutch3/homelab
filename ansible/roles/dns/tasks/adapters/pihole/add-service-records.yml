# ansible/roles/dns/tasks/adapters/pihole/add-service-records.yml
---
- name: "[PIHOLE] Add CNAME record for each discovered service"
  ansible.builtin.uri:
    url: "{{ dns_secondary_api_url }}/config/dns/cnameRecords/{{ item }},{{ dns_manager_hostname }}.{{ base_domain }},0?restart=false"
    method: PUT
    headers:
      sid: "{{ dns_pihole_session_id }}"
    status_code: [200, 201, 400]
  loop: "{{ dns_discovered_domains }}"
  register: dns_pihole_add_cname_result
  ignore_errors: yes
  delegate_to: localhost

- name: "[PIHOLE] Display CNAME status"
  ansible.builtin.debug:
    msg: "Pi-hole CNAME for {{ item.item }}: {{ 'Already exists' if item.status == 400 else 'Added' }}"
  loop: "{{ dns_pihole_add_cname_result.results | default([]) | selectattr('status', 'defined') | list }}"
  when: dns_pihole_add_cname_result.results is defined

- name: "[PIHOLE] Add A record for Pi-hole host"
  ansible.builtin.uri:
    url: "{{ dns_secondary_api_url }}/config/dns/hosts/{{ secondary_dns_host }}%20pi.{{ base_domain }}"
    method: PUT
    headers:
      sid: "{{ dns_pihole_session_id }}"
    status_code: [200, 201, 400]
  ignore_errors: yes
  delegate_to: localhost
  when: stack_name is defined and stack_name == 'dns'
