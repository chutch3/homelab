# ansible/roles/dns/tasks/adapters/technitium/add-machine-records.yml
---
- name: "[TECHNITIUM] Add A record for each machine"
  ansible.builtin.uri:
    url: "{{ dns_primary_api_url }}/zones/records/add"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ dns_api_token }}"
      domain: "{{ item }}.{{ base_domain }}"
      zone: "{{ base_domain }}"
      type: "A"
      ipAddress: "{{ hostvars[item].ansible_host }}"
      ttl: "3600"
    status_code: 200
  loop: "{{ groups['all'] }}"
  register: dns_add_a_record_result
  ignore_errors: yes
  delegate_to: localhost

- name: "[TECHNITIUM] Display A record addition status"
  ansible.builtin.debug:
    msg: "A record for {{ item.item }}.{{ base_domain }} ({{ hostvars[item.item].ansible_host }}): {{ item.json }}"
  loop: "{{ dns_add_a_record_result.results }}"
