---
# ansible/roles/dns/tasks/add-service-cnames.yml
# Discovers services from docker-compose files and registers DNS records.
# Delegates record creation to the appropriate primary/secondary adapter.

# =========================================================================
# DISCOVERY: Find services from Traefik Host() rules (type-agnostic)
# =========================================================================
- name: Find all docker-compose.yml files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../stacks/apps"
    patterns: "docker-compose.yml"
    recurse: yes
  register: dns_compose_files
  delegate_to: localhost
  when: stack_name is not defined

- name: Use specific compose file when stack_name is defined
  ansible.builtin.set_fact:
    dns_compose_files:
      files:
        - path: "{{ compose_file_path }}"
  when: stack_name is defined

- name: Get only compose files with Traefik Host() rules
  ansible.builtin.shell: "grep -l 'Host(' {{ item.path }}"
  loop: "{{ dns_compose_files.files }}"
  register: dns_traefik_compose_files
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Extract Traefik Host() rules
  ansible.builtin.shell: "grep -o 'Host(`[^`]*`)' {{ item.path }}"
  loop: "{{ dns_traefik_compose_files.results | selectattr('rc', '==', 0) | map(attribute='item') | list }}"
  register: dns_traefik_rules
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Process and set discovered domains
  ansible.builtin.set_fact:
    dns_discovered_domains: >
      {{ dns_traefik_rules.results |
         map(attribute='stdout_lines') | flatten |
         map('regex_search', 'Host\(`([^`]+)`\)', '\1') |
         flatten | select('ne', '') |
         map('regex_replace', '\$\{BASE_DOMAIN\}', base_domain) |
         unique | list }}

- name: Display discovered domains
  ansible.builtin.debug:
    msg: "Discovered {{ dns_discovered_domains | length }} domain(s): {{ dns_discovered_domains | join(', ') }}"

- name: Get manager hostname
  ansible.builtin.set_fact:
    dns_manager_hostname: "{{ groups['managers'][0] }}"

# =========================================================================
# REGISTRATION: Delegate to primary and secondary DNS adapters
# =========================================================================
- name: Register records in primary DNS
  ansible.builtin.include_tasks: "adapters/{{ primary_dns_type }}/add-service-records.yml"

- name: Register records in secondary DNS
  ansible.builtin.include_tasks: "adapters/{{ secondary_dns_type }}/add-service-records.yml"
  when: secondary_dns_enabled | bool and dns_pihole_session_id is defined

# =========================================================================
# VERIFICATION: dig-based check (type-agnostic)
# =========================================================================
- name: "[VERIFY] Wait for DNS propagation"
  ansible.builtin.pause:
    seconds: 3
  when: dns_discovered_domains | length > 0

- name: "[VERIFY] Query DNS to verify records exist"
  ansible.builtin.command: "dig +short {{ item }} @{{ dns_primary_api_url | urlsplit('hostname') }}"
  loop: "{{ dns_discovered_domains }}"
  register: dns_verification
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: "[VERIFY] Check DNS resolution results"
  ansible.builtin.set_fact:
    dns_failed_records: "{{ dns_verification.results | selectattr('stdout', 'equalto', '') | map(attribute='item') | list }}"

- name: "[VERIFY] Display DNS verification summary"
  ansible.builtin.debug:
    msg: |
      DNS Verification Summary:
      ========================
      Total records: {{ dns_discovered_domains | length }}
      Verified:      {{ (dns_discovered_domains | length) - (dns_failed_records | length) }}
      Failed:        {{ dns_failed_records | length }}
      {% if dns_failed_records | length > 0 %}
      Failed domains: {{ dns_failed_records | join(', ') }}
      {% endif %}

- name: "[VERIFY] Warn about failed DNS records"
  ansible.builtin.debug:
    msg: "WARNING: {{ dns_failed_records | length }} DNS record(s) failed to resolve"
  when: dns_failed_records | length > 0

- name: "[VERIFY] Display successful DNS resolutions"
  ansible.builtin.debug:
    msg: "✓ DNS record for {{ item.item }} resolves to: {{ item.stdout }}"
  loop: "{{ dns_verification.results }}"
  when: item.stdout != ""

- name: "[SUMMARY] Display final DNS summary"
  ansible.builtin.debug:
    msg:
      status: "{{ 'failed' if dns_failed_records | length > 0 else 'ok' }}"
      primary_dns_type: "{{ primary_dns_type }}"
      secondary_dns_type: "{{ secondary_dns_type if secondary_dns_enabled | bool else 'disabled' }}"
      services_registered: "{{ dns_discovered_domains | length }}"
      dns_verified: "{{ (dns_discovered_domains | length) - (dns_failed_records | length) }}"
      failed_records: "{{ dns_failed_records }}"
