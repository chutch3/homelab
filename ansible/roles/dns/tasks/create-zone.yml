# ansible/roles/dns/tasks/create-zone.yml
---
- name: Get existing zones to check if base_domain already exists
  uri:
    url: "{{ dns_primary_api_url }}/zones/primary"
    method: GET
    headers:
      Authorization: "Bearer {{ dns_api_token }}"
    status_code: 200
    return_content: yes
  register: dns_existing_zones
  when: primary_dns_type == 'technitium'

- name: Check if zone already exists
  set_fact:
    dns_zone_exists: "{{ base_domain in dns_existing_zones.json | default([]) }}"
  when: primary_dns_type == 'technitium' and not ansible_check_mode

- name: Create primary DNS zone
  uri:
    url: "{{ dns_primary_api_url }}/zones/create"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ dns_api_token }}"
      zone: "{{ base_domain }}"
      type: "Primary"
    status_code: 200
  when: primary_dns_type == 'technitium' and not ansible_check_mode and not (dns_zone_exists | default(false))
  register: dns_create_zone_result

- name: Display zone creation status
  debug:
    msg: |
      {% if primary_dns_type != 'technitium' %}
      Zone creation skipped — not applicable for {{ primary_dns_type }}.
      {% elif not (dns_zone_exists | default(false)) %}
      Zone '{{ base_domain }}' created successfully.
      Response: {{ dns_create_zone_result.json | default('(check mode)') }}
      {% else %}
      Zone '{{ base_domain }}' already exists.
      {% endif %}
