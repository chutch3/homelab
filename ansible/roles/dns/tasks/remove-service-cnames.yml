# ansible/roles/dns/tasks/remove-service-cnames.yml
---
- name: Find docker-compose.yml file for specific stack (apps/)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../stacks/apps/{{ stack_name }}/docker-compose.yml"
  register: dns_compose_file_stat_apps
  delegate_to: localhost
  when: stack_name is defined

- name: Find docker-compose.yml file for specific stack (stacks/)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../stacks/{{ stack_name }}/docker-compose.yml"
  register: dns_compose_file_stat_infra
  delegate_to: localhost
  when: stack_name is defined and not dns_compose_file_stat_apps.stat.exists

- name: Set compose files list for specific stack
  set_fact:
    dns_compose_files:
      files:
        - path: "{{ dns_compose_file_stat_apps.stat.path if dns_compose_file_stat_apps.stat.exists else dns_compose_file_stat_infra.stat.path }}"
  when: stack_name is defined and (dns_compose_file_stat_apps.stat.exists or (dns_compose_file_stat_infra is defined and dns_compose_file_stat_infra.stat.exists))

- name: Find all docker-compose.yml files
  find:
    paths: "{{ playbook_dir }}/../../stacks/apps"
    patterns: "docker-compose.yml"
    recurse: yes
  register: dns_compose_files
  delegate_to: localhost
  when: stack_name is not defined

- name: Get only compose files with Traefik Host() rules
  shell: "grep -l 'Host(' {{ item.path }}"
  loop: "{{ dns_compose_files.files }}"
  register: dns_traefik_compose_files
  changed_when: false
  failed_when: false # Ignore rc=1 when no matches
  delegate_to: localhost
  when: dns_compose_files is defined and dns_compose_files.files is defined

- name: Extract Traefik Host() rules
  shell: "grep -o 'Host(`.*`)' {{ item.path }}"
  loop: "{{ dns_traefik_compose_files.results | selectattr('rc', '==', 0) | map(attribute='item') | list }}"
  register: dns_traefik_rules
  changed_when: false
  failed_when: false # Ignore rc=1 when no matches
  delegate_to: localhost
  when: dns_traefik_compose_files is defined and dns_traefik_compose_files.results is defined

- name: Process and set discovered domains
  set_fact:
    dns_discovered_domains: >
      {{ dns_traefik_rules.results |
         map(attribute='stdout_lines') | flatten |
         map('regex_search', 'Host\(`([^`]+)`\)', '\1') |
         flatten | select('ne', '') |
         map('regex_replace', '\$\{BASE_DOMAIN\}', base_domain) |
         unique | list }}
  when: dns_traefik_rules is defined and dns_traefik_rules.results is defined

- name: Display domains to be removed
  debug:
    msg: "Removing {{ dns_discovered_domains | length }} DNS records: {{ dns_discovered_domains }}"
  when: dns_discovered_domains is defined and dns_discovered_domains | length > 0

- name: Remove CNAME record for each discovered service
  uri:
    url: "{{ dns_api_url }}/zones/records/delete"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ dns_api_token }}"
      domain: "{{ item }}"
      zone: "{{ base_domain }}"
      type: "CNAME"
    status_code: [200, 400] # 400 if record doesn't exist
  loop: "{{ dns_discovered_domains }}"
  register: dns_remove_cname_result
  when: dns_discovered_domains is defined and dns_discovered_domains | length > 0

- name: Display CNAME record removal status
  debug:
    msg: "CNAME for {{ item.item }}: {{ 'Removed' if item.json.status == 'ok' else 'Not found or already removed' }}"
  loop: "{{ dns_remove_cname_result.results }}"
  when: dns_remove_cname_result is defined and dns_remove_cname_result.results is defined

# =========================================================================
# SECONDARY DNS: Remove Pi-hole CNAME Records via API
# =========================================================================
- name: "[SECONDARY] Remove CNAME record from Pi-hole for each discovered service"
  ansible.builtin.uri:
    url: "{{ pihole_api_url }}/config/dns/cnameRecords/{{ item }},{{ dns_manager_hostname | default(groups['managers'][0]) }}.{{ base_domain }},0?restart=false"
    method: DELETE
    headers:
      sid: "{{ dns_pihole_session_id }}"
    status_code: [200, 204, 404]
  loop: "{{ dns_discovered_domains }}"
  register: dns_pihole_remove_cname_result
  ignore_errors: yes
  delegate_to: localhost
  when:
    - secondary_dns_enabled | bool
    - dns_pihole_session_id is defined
    - dns_discovered_domains is defined
    - dns_discovered_domains | length > 0

# =========================================================================
# DNS STACK: Remove A record for Pi-hole (direct IP)
# =========================================================================
- name: "[DNS STACK] Remove A record for Pi-hole from Technitium"
  ansible.builtin.uri:
    url: "{{ dns_api_url }}/zones/records/delete"
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ dns_api_token }}"
      domain: "pi.{{ base_domain }}"
      zone: "{{ base_domain }}"
      type: "A"
    status_code: [200, 400]
  delegate_to: localhost
  when: stack_name is defined and stack_name == 'dns' and secondary_dns_enabled | bool

- name: "[DNS STACK] Remove A record for Pi-hole from Pi-hole"
  ansible.builtin.uri:
    url: "{{ pihole_api_url }}/config/dns/hosts/{{ secondary_dns_ip }}%20pi.{{ base_domain }}"
    method: DELETE
    headers:
      sid: "{{ dns_pihole_session_id }}"
    status_code: [200, 204, 404]
  ignore_errors: yes
  delegate_to: localhost
  when:
    - stack_name is defined and stack_name == 'dns'
    - secondary_dns_enabled | bool
    - dns_pihole_session_id is defined
