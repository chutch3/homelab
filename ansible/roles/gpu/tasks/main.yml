# ansible/roles/gpu/tasks/main.yml
---
- name: Check for NVIDIA GPU
  ansible.builtin.shell: lspci | grep -i nvidia
  register: gpu_nvidia_check
  changed_when: false
  failed_when: false

- name: Set GPU present fact
  ansible.builtin.set_fact:
    gpu_present: "{{ gpu_nvidia_check.rc == 0 }}"

- name: Display GPU detection result
  ansible.builtin.debug:
    msg: "NVIDIA GPU {{ 'detected' if gpu_present else 'not detected' }}"

- name: Skip GPU setup if no GPU present
  ansible.builtin.meta: end_play
  when: not gpu_present

- name: Check nvidia-smi status
  ansible.builtin.command: nvidia-smi
  register: gpu_smi_check
  changed_when: false
  failed_when: false

- name: Handle NVIDIA driver mismatch (requires reboot)
  when: gpu_smi_check.rc != 0 and "Driver/library version mismatch" in gpu_smi_check.stderr
  block:
    - name: Warn about NVIDIA driver mismatch
      ansible.builtin.debug:
        msg: "⚠ WARNING: nvidia-smi failed on {{ inventory_hostname }} due to driver mismatch. Rebooting node to resolve..."

    - name: Reboot node to resolve driver mismatch
      ansible.builtin.reboot:
        msg: "Rebooting to resolve NVIDIA driver version mismatch"
        reboot_timeout: 600

    - name: Re-check nvidia-smi status after reboot
      ansible.builtin.command: nvidia-smi
      register: gpu_smi_recheck
      changed_when: false
      failed_when: true

    - name: Update smi check fact
      ansible.builtin.set_fact:
        gpu_smi_check: "{{ gpu_smi_recheck }}"

- name: Warn about other NVIDIA failures
  ansible.builtin.debug:
    msg: "⚠ WARNING: nvidia-smi failed on {{ inventory_hostname }}. Missing drivers or hardware issue."
  when: gpu_smi_check.rc != 0

- name: Download and install NVIDIA Container Toolkit GPG key
  ansible.builtin.shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
      gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.shell: |
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
    tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: yes

- name: Configure Docker for NVIDIA runtime
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  notify: restart docker
  register: gpu_runtime_config
  changed_when: "'Successfully configured' in gpu_runtime_config.stdout"

- name: Generate CDI configuration for NVIDIA
  ansible.builtin.command: nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
  args:
    creates: /etc/cdi/nvidia.yaml
  when: gpu_smi_check.rc == 0

- name: Get GPU UUIDs for Swarm generic resources
  ansible.builtin.shell: |
    nvidia-smi -L | grep -oP 'UUID: \K[^)]+' | awk '{print "NVIDIA-GPU="$1}' | paste -sd ','
  register: gpu_uuids
  changed_when: false
  when: gpu_smi_check.rc == 0

- name: Display detected GPU UUIDs
  ansible.builtin.debug:
    msg: "Detected GPUs: {{ gpu_uuids.stdout | default('None/Error') }}"

- name: Read current Docker daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: gpu_daemon_json_content
  failed_when: false

- name: Parse current daemon.json or create new
  ansible.builtin.set_fact:
    gpu_daemon_json: "{{ gpu_daemon_json_content.content | b64decode | from_json if (gpu_daemon_json_content.content is defined and gpu_daemon_json_content.content | b64decode | length > 0) else {} }}"

- name: Add generic resources to daemon.json
  ansible.builtin.set_fact:
    gpu_daemon_json: "{{ gpu_daemon_json | combine({'node-generic-resources': gpu_uuids.stdout.split(',')}, recursive=true) }}"
  when:
    - gpu_smi_check.rc == 0
    - gpu_uuids.stdout | length > 0

- name: Ensure nvidia runtime is set as default
  ansible.builtin.set_fact:
    gpu_daemon_json: "{{ gpu_daemon_json | combine({'default-runtime': 'nvidia'}, recursive=true) }}"

- name: Write updated daemon.json
  ansible.builtin.copy:
    content: "{{ gpu_daemon_json | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: restart docker

- name: Configure NVIDIA Container Runtime for Swarm
  ansible.builtin.lineinfile:
    path: /etc/nvidia-container-runtime/config.toml
    regexp: '^#?\s*swarm-resource\s*='
    line: 'swarm-resource = "DOCKER_RESOURCE_NVIDIA-GPU"'
    state: present
    create: yes
  notify: restart docker

- name: Flush handlers to restart Docker
  ansible.builtin.meta: flush_handlers

- name: Test GPU in container
  ansible.builtin.command: >
    docker run --rm --gpus all
    nvidia/cuda:12.0.0-base-ubuntu22.04
    nvidia-smi
  changed_when: false
  register: gpu_test
  when:
    - gpu_smi_check.rc == 0
    - gpu_runtime_config.changed

- name: Display GPU test result
  ansible.builtin.debug:
    msg: "GPU test successful"
  when:
    - gpu_runtime_config.changed
    - gpu_test.rc is defined
    - gpu_test.rc == 0
