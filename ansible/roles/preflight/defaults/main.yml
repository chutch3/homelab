# ansible/roles/preflight/defaults/main.yml
# Shared-storage mount roots, resolved from .env with sensible fallbacks.
# Used by the directories:/files:/templates: provisioning tasks. The test
# inventory overrides preflight_provision_become to keep --check unprivileged.
---
preflight_storage_roots:
  app_data: "{{ swarm_env_vars.ISCSI_APP_DATA_MOUNT_PATH | default('/mnt/iscsi/app-data') }}"
  cache: "{{ swarm_env_vars.ISCSI_CACHE_MOUNT_PATH | default('/mnt/iscsi/cache') }}"
