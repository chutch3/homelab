# ansible/roles/preflight/tasks/create-secrets.yml
# Creates Docker Swarm secrets declared in pre-flight.yml.
# Uses docker CLI via the active context to avoid paramiko dependency
# (community.docker.docker_secret uses the Python SDK which requires paramiko for SSH hosts).
#
# from_env secrets are optional: if the env var is absent or empty the secret
# is skipped with a warning. Pair with validate.env to make a secret required.
---
- name: Reset file path resolution dict
  ansible.builtin.set_fact:
    preflight_file_paths: {}

- name: Check which secrets already exist
  ansible.builtin.command:
    cmd: docker --context {{ swarm_docker_context }} secret inspect {{ preflight_secret.name }}
  delegate_to: localhost
  changed_when: false
  # rc=0: secret exists. rc=1: secret not found. Other rc values indicate
  # infrastructure problems (daemon unreachable, permission denied) — these
  # will surface as misleading "create" attempts. failed_when: false is
  # intentional so we can distinguish existence from other errors via rc.
  failed_when: false
  no_log: true
  register: preflight_secret_exists
  loop: "{{ preflight.secrets }}"
  loop_control:
    loop_var: preflight_secret
    label: "{{ preflight_secret.name }}"

- name: Warn when from_env secret source is not set
  ansible.builtin.debug:
    msg: >-
      WARNING: Secret '{{ preflight_result.preflight_secret.name }}' declares
      from_env: {{ preflight_result.preflight_secret.from_env }} but that variable
      is not set in .env — secret will not be created.
  when:
    - preflight_result.preflight_secret.from_env is defined
    - preflight_result.rc != 0
    - preflight_result.preflight_secret.from_env not in swarm_env_vars
      or (swarm_env_vars[preflight_result.preflight_secret.from_env] | default('') | trim) == ''
  loop: "{{ preflight_secret_exists.results }}"
  loop_control:
    loop_var: preflight_result
    label: "{{ preflight_result.preflight_secret.name }}"

- name: Create secret from env var value
  ansible.builtin.shell:
    cmd: >-
      printf '%s' "$PREFLIGHT_SECRET_DATA" |
      docker --context {{ swarm_docker_context }} secret create {{ preflight_result.preflight_secret.name }} -
  environment:
    PREFLIGHT_SECRET_DATA: "{{ swarm_env_vars[preflight_result.preflight_secret.from_env] }}"
  delegate_to: localhost
  no_log: true
  when:
    - preflight_result.preflight_secret.from_env is defined
    - preflight_result.rc != 0
    - preflight_result.preflight_secret.from_env in swarm_env_vars
    - (swarm_env_vars[preflight_result.preflight_secret.from_env] | default('') | trim) != ''
  loop: "{{ preflight_secret_exists.results }}"
  loop_control:
    loop_var: preflight_result
    label: "{{ preflight_result.preflight_secret.name }}"

- name: Resolve file path for file-based secrets
  ansible.builtin.set_fact:
    preflight_file_paths: >-
      {{
        preflight_file_paths | combine({
          preflight_result.preflight_secret.name: (
            swarm_env_vars[preflight_result.preflight_secret.from_file[1:]]
            if preflight_result.preflight_secret.from_file.startswith('$')
            else preflight_result.preflight_secret.from_file
          )
        })
      }}
  when:
    - preflight_result.preflight_secret.from_file is defined
    - preflight_result.rc != 0
  loop: "{{ preflight_secret_exists.results }}"
  loop_control:
    loop_var: preflight_result
    label: "{{ preflight_result.preflight_secret.name }}"

- name: Create secret from file
  ansible.builtin.command:
    cmd: >-
      docker --context {{ swarm_docker_context }} secret create
      {{ preflight_result.preflight_secret.name }}
      {{ preflight_file_paths[preflight_result.preflight_secret.name] }}
  delegate_to: localhost
  no_log: true
  when:
    - preflight_result.preflight_secret.from_file is defined
    - preflight_result.rc != 0
    - preflight_result.preflight_secret.name in preflight_file_paths
  loop: "{{ preflight_secret_exists.results }}"
  loop_control:
    loop_var: preflight_result
    label: "{{ preflight_result.preflight_secret.name }}"
