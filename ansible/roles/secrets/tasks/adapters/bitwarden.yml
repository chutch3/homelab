---
# ansible/roles/secrets/tasks/adapters/bitwarden.yml
# Bitwarden adapter for secret sync and restore

# Every bw CLI call below inherits the unlocked vault session from this single
# environment declaration. secrets_bw_session_token is populated by the
# "Load session key" task; default('') covers tasks that run before it and the
# install action, which has no session.
- name: Bitwarden | Adapter operations
  environment:
    BW_SESSION: "{{ secrets_bw_session_token | default('') }}"
  block:
    - name: Bitwarden | Ensure dependencies are met
      block:
        - name: Bitwarden | Check if CLI is installed and working
          ansible.builtin.command: bw --version
          register: secrets_bw_check
          changed_when: false
          failed_when: false
          no_log: true

        - name: Bitwarden | Install CLI via npm if missing or broken
          ansible.builtin.command: npm install -g @bitwarden/cli
          when: secrets_bw_check.rc != 0
          changed_when: true

    - name: Bitwarden | Check if logged in
      ansible.builtin.command: bw status
      register: secrets_bw_status
      changed_when: false
      failed_when: false
      no_log: true
      when: adapter_action != 'install'

    - name: Bitwarden | Fail if not logged in
      ansible.builtin.fail:
        msg: "Bitwarden CLI is not logged in. Run 'task ansible:secrets:login' first."
      when: >-
        adapter_action != 'install' and
        (secrets_bw_status.rc != 0 or 'unauthenticated' in secrets_bw_status.stdout)

    - name: Bitwarden | Load session key
      ansible.builtin.set_fact:
        secrets_bw_session_token: "{{ _bw_token }}"
      vars:
        _env_token: "{{ bw_session | default(lookup('env', 'BW_SESSION')) }}"
        _file_content: "{{ lookup('file', ansible_env.HOME ~ '/.bw_session', errors='ignore') }}"
        _file_token: "{{ (_file_content | regex_search('(?m)^BW_SESSION=(.+)$', '\\1') or ['']) | first }}"
        _bw_token: "{{ _env_token if _env_token | length > 0 else _file_token }}"
      no_log: true
      when: adapter_action != 'install'

    - name: Bitwarden | Fail if vault is locked and no session available
      ansible.builtin.fail:
        msg: "Bitwarden vault is locked. Run 'task ansible:secrets:login' or set BW_SESSION."
      when: >-
        adapter_action != 'install' and
        'locked' in secrets_bw_status.stdout and
        secrets_bw_session_token | length == 0

    - name: Bitwarden | Sync vault
      ansible.builtin.command: bw sync
      register: secrets_bw_sync_result
      changed_when: false
      failed_when: false
      no_log: true
      when: adapter_action in ['pull', 'push', 'compare']

    - name: Bitwarden | Fail if sync failed
      ansible.builtin.fail:
        msg: >-
          Bitwarden sync failed (rc={{ secrets_bw_sync_result.rc }}).
          Your session token is likely invalid or vault data is corrupted.
          Run 'task ansible:secrets:login' to re-authenticate and get a fresh session.
      when: >-
        adapter_action in ['pull', 'push', 'compare'] and
        secrets_bw_sync_result.rc != 0

    - name: Bitwarden | List items from vault
      ansible.builtin.command: bw list items
      register: secrets_bw_search_json
      changed_when: false
      no_log: true
      when: adapter_action in ['pull', 'push', 'compare']

    - name: Bitwarden | Set item facts
      ansible.builtin.set_fact:
        secrets_bw_item_list: "{{ (secrets_bw_search_json.stdout if secrets_bw_search_json.stdout | trim else '[]') | from_json }}"
      no_log: true
      when: adapter_action in ['pull', 'push', 'compare']

    - name: Bitwarden | Extract specific item
      ansible.builtin.set_fact:
        secrets_bw_item: "{{ matching | first | default({}) }}"
        secrets_bw_item_found: "{{ (matching | length) > 0 }}"
      vars:
        matching: "{{ secrets_bw_item_list | selectattr('name', 'equalto', secret_vault_item) | list }}"
      no_log: true
      when: adapter_action in ['pull', 'push', 'compare']

    - name: Bitwarden | Pull action
      when: adapter_action == 'pull'
      block:
        - name: Bitwarden | Fail if item not found
          ansible.builtin.fail:
            msg: "No vault item named '{{ secret_vault_item }}' found. Run 'task ansible:secrets:push' first."
          when: not secrets_bw_item_found

        - name: Bitwarden | Find secrets.env attachment
          ansible.builtin.set_fact:
            secrets_bw_env_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'secrets.env')
                | list | first | default({})
              }}
          no_log: true

        - name: Bitwarden | Fail if secrets.env attachment missing
          ansible.builtin.fail:
            msg: "No 'secrets.env' attachment found on '{{ secret_vault_item }}'. Run 'task ansible:secrets:push' first."
          when: secrets_bw_env_attachment.id is not defined

        - name: Bitwarden | Find hosts.yml attachment
          ansible.builtin.set_fact:
            secrets_bw_hosts_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'hosts.yml')
                | list | first | default({})
              }}
          no_log: true

        - name: Bitwarden | Find ansible-ssh.yml attachment
          ansible.builtin.set_fact:
            secrets_bw_ssh_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'ansible-ssh.yml')
                | list | first | default({})
              }}
          no_log: true

        - name: Bitwarden | Find ansible-snmp.yml attachment
          ansible.builtin.set_fact:
            secrets_bw_snmp_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'ansible-snmp.yml')
                | list | first | default({})
              }}
          no_log: true

        - name: Bitwarden | Create temp directory for download
          ansible.builtin.tempfile:
            state: directory
            suffix: .bw
          register: secrets_bw_pull_temp_dir
          no_log: true

        - name: Bitwarden | Download secrets.env attachment
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_env_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_pull_temp_dir.path }}/secrets.env
          changed_when: false
          no_log: true

        - name: Bitwarden | Read secrets.env content
          ansible.builtin.slurp:
            src: "{{ secrets_bw_pull_temp_dir.path }}/secrets.env"
          register: secrets_bw_env_content
          no_log: true

        - name: Bitwarden | Set restored env content fact
          ansible.builtin.set_fact:
            secrets_restored_env_content: "{{ secrets_bw_env_content.content | b64decode }}"
          no_log: true

        - name: Bitwarden | Download hosts.yml attachment
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_hosts_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_pull_temp_dir.path }}/hosts.yml
          when: secrets_bw_hosts_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read hosts.yml content
          ansible.builtin.slurp:
            src: "{{ secrets_bw_pull_temp_dir.path }}/hosts.yml"
          register: secrets_bw_hosts_content
          when: secrets_bw_hosts_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set restored hosts content fact
          ansible.builtin.set_fact:
            secrets_restored_hosts_content: "{{ secrets_bw_hosts_content.content | b64decode }}"
          when: secrets_bw_hosts_attachment.id is defined
          no_log: true

        - name: Bitwarden | Download ansible-ssh.yml attachment
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_ssh_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_pull_temp_dir.path }}/ansible-ssh.yml
          when: secrets_bw_ssh_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read ansible-ssh.yml content
          ansible.builtin.slurp:
            src: "{{ secrets_bw_pull_temp_dir.path }}/ansible-ssh.yml"
          register: secrets_bw_ssh_content
          when: secrets_bw_ssh_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set restored SSH config content fact
          ansible.builtin.set_fact:
            secrets_restored_ssh_content: "{{ secrets_bw_ssh_content.content | b64decode }}"
          when: secrets_bw_ssh_attachment.id is defined
          no_log: true

        - name: Bitwarden | Download ansible-snmp.yml attachment
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_snmp_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_pull_temp_dir.path }}/ansible-snmp.yml
          when: secrets_bw_snmp_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read ansible-snmp.yml content
          ansible.builtin.slurp:
            src: "{{ secrets_bw_pull_temp_dir.path }}/ansible-snmp.yml"
          register: secrets_bw_snmp_content
          when: secrets_bw_snmp_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set restored SNMP config content fact
          ansible.builtin.set_fact:
            secrets_restored_snmp_content: "{{ secrets_bw_snmp_content.content | b64decode }}"
          when: secrets_bw_snmp_attachment.id is defined
          no_log: true

        - name: Bitwarden | Remove temp directory
          ansible.builtin.file:
            path: "{{ secrets_bw_pull_temp_dir.path }}"
            state: absent
          no_log: true

    - name: Bitwarden | Compare action
      when: adapter_action == 'compare'
      block:
        - name: Bitwarden | Fail if item not found
          ansible.builtin.fail:
            msg: "No vault item named '{{ secret_vault_item }}' found. Run 'task ansible:secrets:push' first."
          when: not secrets_bw_item_found

        - name: Bitwarden | Find attachments for compare
          ansible.builtin.set_fact:
            secrets_bw_env_attachment: >-
              {{ secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'secrets.env') | list | first | default({}) }}
            secrets_bw_hosts_attachment: >-
              {{ secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'hosts.yml') | list | first | default({}) }}
            secrets_bw_ssh_attachment: >-
              {{ secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'ansible-ssh.yml') | list | first | default({}) }}
            secrets_bw_snmp_attachment: >-
              {{ secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'ansible-snmp.yml') | list | first | default({}) }}
          no_log: true

        - name: Bitwarden | Create temp directory for compare
          ansible.builtin.tempfile:
            state: directory
            suffix: .bw
          register: secrets_bw_compare_temp_dir
          no_log: true

        - name: Bitwarden | Download secrets.env for compare
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_env_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_compare_temp_dir.path }}/secrets.env
          when: secrets_bw_env_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read remote secrets.env
          ansible.builtin.slurp:
            src: "{{ secrets_bw_compare_temp_dir.path }}/secrets.env"
          register: secrets_bw_remote_env
          when: secrets_bw_env_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set remote env fact
          ansible.builtin.set_fact:
            secrets_remote_env_content: "{{ secrets_bw_remote_env.content | b64decode }}"
          when: secrets_bw_env_attachment.id is defined
          no_log: true

        - name: Bitwarden | Download hosts.yml for compare
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_hosts_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_compare_temp_dir.path }}/hosts.yml
          when: secrets_bw_hosts_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read remote hosts.yml
          ansible.builtin.slurp:
            src: "{{ secrets_bw_compare_temp_dir.path }}/hosts.yml"
          register: secrets_bw_remote_hosts
          when: secrets_bw_hosts_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set remote hosts fact
          ansible.builtin.set_fact:
            secrets_remote_hosts_content: "{{ secrets_bw_remote_hosts.content | b64decode }}"
          when: secrets_bw_hosts_attachment.id is defined
          no_log: true

        - name: Bitwarden | Download ansible-ssh.yml for compare
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_ssh_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_compare_temp_dir.path }}/ansible-ssh.yml
          when: secrets_bw_ssh_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read remote ansible-ssh.yml
          ansible.builtin.slurp:
            src: "{{ secrets_bw_compare_temp_dir.path }}/ansible-ssh.yml"
          register: secrets_bw_remote_ssh
          when: secrets_bw_ssh_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set remote ssh fact
          ansible.builtin.set_fact:
            secrets_remote_ssh_content: "{{ secrets_bw_remote_ssh.content | b64decode }}"
          when: secrets_bw_ssh_attachment.id is defined
          no_log: true

        - name: Bitwarden | Download ansible-snmp.yml for compare
          ansible.builtin.command: >-
            bw get attachment {{ secrets_bw_snmp_attachment.id }}
            --itemid {{ secrets_bw_item.id }}
            --output {{ secrets_bw_compare_temp_dir.path }}/ansible-snmp.yml
          when: secrets_bw_snmp_attachment.id is defined
          changed_when: false
          no_log: true

        - name: Bitwarden | Read remote ansible-snmp.yml
          ansible.builtin.slurp:
            src: "{{ secrets_bw_compare_temp_dir.path }}/ansible-snmp.yml"
          register: secrets_bw_remote_snmp
          when: secrets_bw_snmp_attachment.id is defined
          no_log: true

        - name: Bitwarden | Set remote snmp fact
          ansible.builtin.set_fact:
            secrets_remote_snmp_content: "{{ secrets_bw_remote_snmp.content | b64decode }}"
          when: secrets_bw_snmp_attachment.id is defined
          no_log: true

        - name: Bitwarden | Remove compare temp directory
          ansible.builtin.file:
            path: "{{ secrets_bw_compare_temp_dir.path }}"
            state: absent
          no_log: true

    - name: Bitwarden | Push action
      when: adapter_action == 'push'
      block:
        - name: Bitwarden | Create vault item if missing
          when: not secrets_bw_item_found
          block:
            - name: Bitwarden | Get item template
              ansible.builtin.command: bw get template item
              register: secrets_bw_template_json
              changed_when: false
              no_log: true

            - name: Bitwarden | Prepare minimal secure note JSON
              ansible.builtin.set_fact:
                secrets_new_bw_item: >-
                  {{
                    (secrets_bw_template_json.stdout | from_json) | combine({
                      'name': secret_vault_item,
                      'notes': '',
                      'type': 2,
                      'secureNote': {'type': 0}
                    })
                  }}
              no_log: true

            - name: Bitwarden | Create vault item
              ansible.builtin.shell: "bw encode | bw create item"
              args:
                stdin: "{{ secrets_new_bw_item | to_json }}"
              register: secrets_bw_created_item_raw
              no_log: true
              changed_when: true

            - name: Bitwarden | Set item ID from newly created item
              ansible.builtin.set_fact:
                secrets_bw_push_item_id: "{{ (secrets_bw_created_item_raw.stdout | from_json).id }}"
              no_log: true

        - name: Bitwarden | Use existing item ID
          ansible.builtin.set_fact:
            secrets_bw_push_item_id: "{{ secrets_bw_item.id }}"
          when: secrets_bw_item_found
          no_log: true

        - name: Bitwarden | Create temp directory for upload
          ansible.builtin.tempfile:
            state: directory
            suffix: .bw
          register: secrets_bw_push_temp_dir
          no_log: true

        - name: Bitwarden | Delete existing secrets.env attachment if present
          ansible.builtin.command: >-
            bw delete attachment {{ secrets_existing_env_attachment.id }}
            --itemid {{ secrets_bw_push_item_id }}
          vars:
            secrets_existing_env_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'secrets.env')
                | list | first | default({})
              }}
          when: >-
            secrets_bw_item_found and
            (secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'secrets.env') | list | length) > 0
          no_log: true
          changed_when: true

        - name: Bitwarden | Write secrets.env to temp directory
          ansible.builtin.copy:
            content: "{{ secrets_env_content }}"
            dest: "{{ secrets_bw_push_temp_dir.path }}/secrets.env"
            mode: '0600'
          no_log: true

        - name: Bitwarden | Upload secrets.env as attachment
          ansible.builtin.command: >-
            bw create attachment
            --file {{ secrets_bw_push_temp_dir.path }}/secrets.env
            --itemid {{ secrets_bw_push_item_id }}
          no_log: true
          changed_when: true

        - name: Bitwarden | Delete existing hosts.yml attachment if present
          ansible.builtin.command: >-
            bw delete attachment {{ secrets_existing_hosts_attachment.id }}
            --itemid {{ secrets_bw_push_item_id }}
          vars:
            secrets_existing_hosts_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'hosts.yml')
                | list | first | default({})
              }}
          when: >-
            secrets_hosts_content is defined and
            secrets_bw_item_found and
            (secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'hosts.yml') | list | length) > 0
          no_log: true
          changed_when: true

        - name: Bitwarden | Write hosts.yml to temp directory
          ansible.builtin.copy:
            content: "{{ secrets_hosts_content }}"
            dest: "{{ secrets_bw_push_temp_dir.path }}/hosts.yml"
            mode: '0600'
          when: secrets_hosts_content is defined
          no_log: true

        - name: Bitwarden | Upload hosts.yml as attachment
          ansible.builtin.command: >-
            bw create attachment
            --file {{ secrets_bw_push_temp_dir.path }}/hosts.yml
            --itemid {{ secrets_bw_push_item_id }}
          when: secrets_hosts_content is defined
          no_log: true
          changed_when: true

        - name: Bitwarden | Delete existing ansible-ssh.yml attachment if present
          ansible.builtin.command: >-
            bw delete attachment {{ secrets_existing_ssh_attachment.id }}
            --itemid {{ secrets_bw_push_item_id }}
          vars:
            secrets_existing_ssh_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'ansible-ssh.yml')
                | list | first | default({})
              }}
          when: >-
            secrets_ssh_content is defined and
            secrets_bw_item_found and
            (secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'ansible-ssh.yml') | list | length) > 0
          no_log: true
          changed_when: true

        - name: Bitwarden | Write ansible-ssh.yml to temp directory
          ansible.builtin.copy:
            content: "{{ secrets_ssh_content }}"
            dest: "{{ secrets_bw_push_temp_dir.path }}/ansible-ssh.yml"
            mode: '0600'
          when: secrets_ssh_content is defined
          no_log: true

        - name: Bitwarden | Upload ansible-ssh.yml as attachment
          ansible.builtin.command: >-
            bw create attachment
            --file {{ secrets_bw_push_temp_dir.path }}/ansible-ssh.yml
            --itemid {{ secrets_bw_push_item_id }}
          when: secrets_ssh_content is defined
          no_log: true
          changed_when: true

        - name: Bitwarden | Delete existing ansible-snmp.yml attachment if present
          ansible.builtin.command: >-
            bw delete attachment {{ secrets_existing_snmp_attachment.id }}
            --itemid {{ secrets_bw_push_item_id }}
          vars:
            secrets_existing_snmp_attachment: >-
              {{
                secrets_bw_item.attachments | default([])
                | selectattr('fileName', 'equalto', 'ansible-snmp.yml')
                | list | first | default({})
              }}
          when: >-
            secrets_snmp_content is defined and
            secrets_bw_item_found and
            (secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'ansible-snmp.yml') | list | length) > 0
          no_log: true
          changed_when: true

        - name: Bitwarden | Write ansible-snmp.yml to temp directory
          ansible.builtin.copy:
            content: "{{ secrets_snmp_content }}"
            dest: "{{ secrets_bw_push_temp_dir.path }}/ansible-snmp.yml"
            mode: '0600'
          when: secrets_snmp_content is defined
          no_log: true

        - name: Bitwarden | Upload ansible-snmp.yml as attachment
          ansible.builtin.command: >-
            bw create attachment
            --file {{ secrets_bw_push_temp_dir.path }}/ansible-snmp.yml
            --itemid {{ secrets_bw_push_item_id }}
          when: secrets_snmp_content is defined
          no_log: true
          changed_when: true

        - name: Bitwarden | Remove temp directory
          ansible.builtin.file:
            path: "{{ secrets_bw_push_temp_dir.path }}"
            state: absent
          no_log: true
