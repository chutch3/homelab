---
# ansible/roles/secrets/tasks/adapters/bitwarden.yml
# Bitwarden adapter for secret sync and restore

- name: Bitwarden | Ensure dependencies are met
  block:
    - name: Bitwarden | Check if CLI is installed and working
      ansible.builtin.command: bw --version
      register: secrets_bw_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Bitwarden | Install CLI via npm if missing or broken
      ansible.builtin.command: npm install -g @bitwarden/cli
      when: secrets_bw_check.rc != 0
      changed_when: true

- name: Bitwarden | Check if logged in
  ansible.builtin.command: bw status
  register: secrets_bw_status
  changed_when: false
  failed_when: false
  no_log: true
  when: adapter_action != 'install'

- name: Bitwarden | Fail if not logged in
  ansible.builtin.fail:
    msg: "Bitwarden CLI is not logged in. Run 'task ansible:secrets:login' first."
  when: >-
    adapter_action != 'install' and
    (secrets_bw_status.rc != 0 or 'unauthenticated' in secrets_bw_status.stdout)

- name: Bitwarden | Fail if vault is locked
  ansible.builtin.fail:
    msg: "Bitwarden vault is locked. Run 'task ansible:secrets:login' or set BW_SESSION."
  when: >-
    adapter_action != 'install' and
    'locked' in secrets_bw_status.stdout and
    (bw_session | default('') == '') and
    (lookup('env', 'BW_SESSION') == '')

- name: Bitwarden | Search for item in vault
  ansible.builtin.command: "bw list items --search \"{{ secret_vault_item }}\""
  register: secrets_bw_search_json
  changed_when: false
  no_log: true
  when: adapter_action in ['pull', 'push']

- name: Bitwarden | Set item facts
  ansible.builtin.set_fact:
    secrets_bw_item_list: "{{ secrets_bw_search_json.stdout | from_json }}"
  no_log: true
  when: adapter_action in ['pull', 'push']

- name: Bitwarden | Extract specific item
  ansible.builtin.set_fact:
    secrets_bw_item: "{{ matching | first | default({}) }}"
    secrets_bw_item_found: "{{ (matching | length) > 0 }}"
  vars:
    matching: "{{ secrets_bw_item_list | selectattr('name', 'equalto', secret_vault_item) | list }}"
  no_log: true
  when: adapter_action in ['pull', 'push']

- name: Bitwarden | Pull action
  when: adapter_action == 'pull'
  block:
    - name: Bitwarden | Fail if item not found
      ansible.builtin.fail:
        msg: "No vault item named '{{ secret_vault_item }}' found. Run 'task ansible:secrets:push' first."
      when: not secrets_bw_item_found

    - name: Bitwarden | Find secrets attachment ID
      ansible.builtin.set_fact:
        secrets_bw_secrets_attachment: >-
          {{
            secrets_bw_item.attachments | default([])
            | selectattr('fileName', 'equalto', 'secrets.env')
            | list | first | default({})
          }}
      no_log: true

    - name: Bitwarden | Fail if secrets attachment missing
      ansible.builtin.fail:
        msg: "No 'secrets.env' attachment found on '{{ secret_vault_item }}'. Run 'task ansible:secrets:push' first."
      when: secrets_bw_secrets_attachment.id is not defined

    - name: Bitwarden | Create temp directory for download
      ansible.builtin.tempfile:
        state: directory
        suffix: .bw
      register: secrets_bw_pull_temp_dir
      no_log: true

    - name: Bitwarden | Download secrets attachment
      ansible.builtin.command: >-
        bw get attachment {{ secrets_bw_secrets_attachment.id }}
        --itemid {{ secrets_bw_item.id }}
        --output {{ secrets_bw_pull_temp_dir.path }}/secrets.env
      changed_when: false
      no_log: true

    - name: Bitwarden | Read attachment content
      ansible.builtin.slurp:
        src: "{{ secrets_bw_pull_temp_dir.path }}/secrets.env"
      register: secrets_bw_attachment_content
      no_log: true

    - name: Bitwarden | Set restored content fact
      ansible.builtin.set_fact:
        secrets_restored_env_content: "{{ secrets_bw_attachment_content.content | b64decode }}"
      no_log: true

    - name: Bitwarden | Remove temp directory
      ansible.builtin.file:
        path: "{{ secrets_bw_pull_temp_dir.path }}"
        state: absent
      no_log: true

- name: Bitwarden | Push action
  when: adapter_action == 'push'
  block:
    - name: Bitwarden | Create vault item if missing
      when: not secrets_bw_item_found
      block:
        - name: Bitwarden | Get item template
          ansible.builtin.command: bw get template item
          register: secrets_bw_template_json
          changed_when: false
          no_log: true

        - name: Bitwarden | Prepare minimal secure note JSON
          ansible.builtin.set_fact:
            secrets_new_bw_item: >-
              {{
                (secrets_bw_template_json.stdout | from_json) | combine({
                  'name': secret_vault_item,
                  'notes': '',
                  'type': 2,
                  'secureNote': {'type': 0}
                })
              }}
          no_log: true

        - name: Bitwarden | Create vault item
          ansible.builtin.shell: "bw encode | bw create item"
          args:
            stdin: "{{ secrets_new_bw_item | to_json }}"
          register: secrets_bw_created_item_raw
          no_log: true
          changed_when: true

        - name: Bitwarden | Set item ID from newly created item
          ansible.builtin.set_fact:
            secrets_bw_push_item_id: "{{ (secrets_bw_created_item_raw.stdout | from_json).id }}"
          no_log: true

    - name: Bitwarden | Use existing item ID
      ansible.builtin.set_fact:
        secrets_bw_push_item_id: "{{ secrets_bw_item.id }}"
      when: secrets_bw_item_found
      no_log: true

    - name: Bitwarden | Delete existing secrets attachment if present
      ansible.builtin.command: >-
        bw delete attachment {{ secrets_existing_attachment.id }}
        --itemid {{ secrets_bw_push_item_id }}
      vars:
        secrets_existing_attachment: >-
          {{
            secrets_bw_item.attachments | default([])
            | selectattr('fileName', 'equalto', 'secrets.env')
            | list | first | default({})
          }}
      when: >-
        secrets_bw_item_found and
        (secrets_bw_item.attachments | default([]) | selectattr('fileName', 'equalto', 'secrets.env') | list | length) > 0
      no_log: true
      changed_when: true

    - name: Bitwarden | Create temp directory for upload
      ansible.builtin.tempfile:
        state: directory
        suffix: .bw
      register: secrets_bw_push_temp_dir
      no_log: true

    - name: Bitwarden | Write env content to temp file
      ansible.builtin.copy:
        content: "{{ secrets_env_content }}"
        dest: "{{ secrets_bw_push_temp_dir.path }}/secrets.env"
        mode: '0600'
      no_log: true

    - name: Bitwarden | Upload env as attachment
      ansible.builtin.command: >-
        bw create attachment
        --file {{ secrets_bw_push_temp_dir.path }}/secrets.env
        --itemid {{ secrets_bw_push_item_id }}
      no_log: true
      changed_when: true

    - name: Bitwarden | Remove temp directory
      ansible.builtin.file:
        path: "{{ secrets_bw_push_temp_dir.path }}"
        state: absent
      no_log: true
