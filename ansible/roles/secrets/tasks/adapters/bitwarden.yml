---
# ansible/roles/secrets/tasks/adapters/bitwarden.yml
# Bitwarden adapter for secret sync and restore

- name: Bitwarden | Ensure dependencies are met
  block:
    - name: Bitwarden | Check if CLI is installed
      ansible.builtin.command: which bw
      register: bw_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Bitwarden | Install CLI if missing
      block:
        - name: Bitwarden | Ensure local bin exists
          ansible.builtin.file:
            path: "{{ ansible_env.HOME }}/.local/bin"
            state: directory
            mode: "0755"

        - name: Bitwarden | Download and install CLI binary
          ansible.builtin.unarchive:
            src: "https://vault.bitwarden.com/download/?app=cli&platform=linux"
            dest: "{{ ansible_env.HOME }}/.local/bin"
            remote_src: yes
            mode: "0755"
      when: bw_check.rc != 0

- name: Bitwarden | Check if logged in
  ansible.builtin.command: bw status
  register: bw_status
  changed_when: false
  no_log: true
  environment:
    BW_SESSION: "{{ bw_session | default(lookup('env', 'BW_SESSION')) }}"

- name: Bitwarden | Fail if not logged in
  ansible.builtin.fail:
    msg: "Bitwarden CLI is not logged in. Run 'task secrets:login' first."
  when: "'unauthenticated' in bw_status.stdout"

- name: Bitwarden | Fail if vault is locked
  ansible.builtin.fail:
    msg: "Bitwarden vault is locked. Run 'task secrets:login' or set BW_SESSION."
  when: "'locked' in bw_status.stdout and (bw_session | default('') == '') and (lookup('env', 'BW_SESSION') == '')"

- name: Bitwarden | Search for item in vault
  ansible.builtin.command: "bw list items --search \"{{ secret_vault_item }}\""
  register: bw_search_json
  changed_when: false
  no_log: true
  environment:
    BW_SESSION: "{{ bw_session | default(lookup('env', 'BW_SESSION')) }}"

- name: Bitwarden | Set item facts
  ansible.builtin.set_fact:
    bw_item_list: "{{ bw_search_json.stdout | from_json }}"
  no_log: true

- name: Bitwarden | Extract specific item
  ansible.builtin.set_fact:
    bw_item: "{{ bw_item_list | selectattr('name', 'equalto', secret_vault_item) | first | default(none) }}"
  no_log: true

- name: Bitwarden | Pull action
  ansible.builtin.set_fact:
    restored_env_content: "{{ bw_item.notes if bw_item else '' }}"
  no_log: true
  when: adapter_action == 'pull'

- name: Bitwarden | Push action
  block:
    - name: Bitwarden | Create template if item missing
      ansible.builtin.command: bw get template item
      register: bw_template_json
      when: bw_item is none
      changed_when: false
      no_log: true

    - name: Bitwarden | Prepare item JSON (Update)
      ansible.builtin.set_fact:
        final_bw_item: "{{ bw_item | combine({'notes': env_content}) }}"
      when: bw_item is not none
      no_log: true

    - name: Bitwarden | Prepare item JSON (Create)
      ansible.builtin.set_fact:
        final_bw_item: "{{ (bw_template_json.stdout | from_json) | combine({'name': secret_vault_item, 'notes': env_content, 'type': 2}) }}"
      when: bw_item is none
      no_log: true

    - name: Bitwarden | Push content to vault (Update)
      ansible.builtin.shell: "echo '{{ final_bw_item | to_json }}' | bw edit item {{ bw_item.id }}"
      environment:
        BW_SESSION: "{{ bw_session | default(lookup('env', 'BW_SESSION')) }}"
      no_log: true
      changed_when: true
      when: bw_item is not none

    - name: Bitwarden | Push content to vault (Create)
      ansible.builtin.shell: "echo '{{ final_bw_item | to_json }}' | bw create item"
      environment:
        BW_SESSION: "{{ bw_session | default(lookup('env', 'BW_SESSION')) }}"
      no_log: true
      changed_when: true
      when: bw_item is none
  when: adapter_action == 'push'
