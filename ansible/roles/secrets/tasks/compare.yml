---
# ansible/roles/secrets/tasks/compare.yml
# Fetch remote secrets, diff against local, display masked unified diff, then delete tmp files.

- name: Validate configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Fetch remote secrets for comparison
  ansible.builtin.include_tasks: "adapters/{{ secret_provider }}.yml"
  vars:
    adapter_action: compare
  no_log: true

- name: Create temp directory
  ansible.builtin.tempfile:
    state: directory
    suffix: .secrets-compare
  register: secrets_compare_dir
  no_log: true

- name: Write remote files to temp
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ secrets_compare_dir.path }}/{{ item.name }}"
    mode: '0600'
  loop:
    - {name: remote.env, content: "{{ secrets_remote_env_content | default('') }}"}
    - {name: remote-hosts.yml, content: "{{ secrets_remote_hosts_content | default('') }}"}
    - {name: remote-ssh.yml, content: "{{ secrets_remote_ssh_content | default('') }}"}
    - {name: remote-snmp.yml, content: "{{ secrets_remote_snmp_content | default('') }}"}
  no_log: true

- name: Generate diff
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import difflib, re, sys

    base   = "{{ secrets_compare_dir.path }}"
    repo   = "{{ playbook_dir }}/../../"

    LOCAL_FILES = {
        ".env":             repo + ".env",
        "02-hosts.yml":     repo + "ansible/inventory/02-hosts.yml",
        "ansible-ssh.yml":  repo + "ansible/inventory/group_vars/all/ssh.yml",
        "ansible-snmp.yml": repo + "ansible/inventory/group_vars/all/snmp.yml",
    }
    REMOTE_FILES = {
        ".env":             base + "/remote.env",
        "02-hosts.yml":     base + "/remote-hosts.yml",
        "ansible-ssh.yml":  base + "/remote-ssh.yml",
        "ansible-snmp.yml": base + "/remote-snmp.yml",
    }

    def read(path):
        try:
            return open(path).readlines()
        except FileNotFoundError:
            return []

    def mask_env_lines(lines):
        """Replace values in KEY=VALUE lines with **** to keep diffs safe."""
        out = []
        for line in lines:
            if re.match(r'^[A-Za-z_][A-Za-z0-9_]*=', line.strip()):
                key = line.split('=', 1)[0]
                out.append(f"{key}=****\n")
            else:
                out.append(line if line.endswith('\n') else line + '\n')
        return out

    output   = []
    any_diff = False

    for filename in LOCAL_FILES:
        local_raw  = read(LOCAL_FILES[filename])
        remote_raw = read(REMOTE_FILES[filename])

        is_env = filename == ".env"
        local  = mask_env_lines(local_raw)  if is_env else local_raw
        remote = mask_env_lines(remote_raw) if is_env else remote_raw

        diff = list(difflib.unified_diff(
            remote,
            local,
            fromfile=f"remote/{filename}",
            tofile=f"local/{filename}",
            lineterm="",
        ))

        if not diff:
            output.append(f"  ✓  {filename}")
        else:
            any_diff = True
            output.append(f"\n  ✗  {filename}")
            if is_env:
                output.append("     (values masked — only key names shown)")
            for line in diff:
                if line.startswith('---') or line.startswith('+++'):
                    output.append(f"     {line}")
                elif line.startswith('-'):
                    output.append(f"     \033[31m{line}\033[0m")   # red
                elif line.startswith('+'):
                    output.append(f"     \033[32m{line}\033[0m")   # green
                elif line.startswith('@@'):
                    output.append(f"     \033[36m{line}\033[0m")   # cyan
                else:
                    output.append(f"     {line}")

    print("\n" + "=" * 60)
    print("  Secrets Comparison  (remote → local)")
    print("  - lines exist in remote but not local  (lost on push)")
    print("  + lines exist in local but not remote  (added on push)")
    print("=" * 60)
    for l in output:
        print(l)
    print()

    if not any_diff:
        print("  ✓ All files in sync — safe to push or pull.\n")
    else:
        # Determine recommendation
        has_remote_only = any(
            any(line.startswith('-') and not line.startswith('---')
                for line in difflib.unified_diff(
                    mask_env_lines(read(REMOTE_FILES[f])) if f == ".env" else read(REMOTE_FILES[f]),
                    mask_env_lines(read(LOCAL_FILES[f]))  if f == ".env" else read(LOCAL_FILES[f]),
                    lineterm="",
                ))
            for f in LOCAL_FILES
        )
        if has_remote_only:
            print("  ⚠  RECOMMENDATION: Pull first — remote has changes not in local.")
            print("     Pushing now would overwrite them in Bitwarden.\n")
        else:
            print("  ✓  RECOMMENDATION: Safe to push — local only adds new content.\n")
    PYEOF
  args:
    executable: /bin/bash
  register: secrets_diff_output
  changed_when: false

- name: Show diff
  ansible.builtin.debug:
    msg: "{{ secrets_diff_output.stdout_lines }}"

- name: Remove temp directory
  ansible.builtin.file:
    path: "{{ secrets_compare_dir.path }}"
    state: absent
  no_log: true
