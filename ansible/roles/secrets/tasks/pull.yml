---
# ansible/roles/secrets/tasks/pull.yml
# Pull secret files from the secret provider and write them locally

- name: Validate configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Pull from adapter
  ansible.builtin.include_tasks: "adapters/{{ secret_provider }}.yml"
  vars:
    adapter_action: pull
  no_log: true

- name: Write restored .env file
  ansible.builtin.copy:
    content: "{{ secrets_restored_env_content }}"
    dest: "{{ playbook_dir }}/../../.env"
    mode: "0600"
  no_log: true
  when: secrets_restored_env_content is defined

- name: Write restored ansible hosts file
  ansible.builtin.copy:
    content: "{{ secrets_restored_hosts_content }}"
    dest: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
    mode: "0600"
  no_log: true
  when: secrets_restored_hosts_content is defined

- name: Write restored ansible SSH config
  ansible.builtin.copy:
    content: "{{ secrets_restored_ssh_content }}"
    dest: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
    mode: "0600"
  no_log: true
  when: secrets_restored_ssh_content is defined
