---
# ansible/roles/secrets/tasks/pull.yml
# Pull secret files from the secret provider and write them locally

- name: Validate configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Define managed secret files
  ansible.builtin.set_fact:
    secrets_managed_files:
      - attachment: "secrets.env"
        dest: "{{ playbook_dir }}/../../.env"
        required: true
      - attachment: "hosts.yml"
        dest: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
        required: false
      - attachment: "ansible-ssh.yml"
        dest: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
        required: false

- name: Pull from adapter
  ansible.builtin.include_tasks: "adapters/{{ secret_provider }}.yml"
  vars:
    adapter_action: pull
  no_log: true

- name: Write restored secret files
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    mode: "0600"
  no_log: true
  loop: "{{ secrets_pulled_files }}"
  loop_control:
    label: "{{ item.dest }}"
