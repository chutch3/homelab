---
# ansible/roles/secrets/tasks/push.yml
# Push local secret files to the secret provider

- name: Validate configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Check if local .env file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../.env"
  register: secrets_env_file_stat
  delegate_to: localhost

- name: Fail if .env is missing
  ansible.builtin.fail:
    msg: "Local .env file not found. Nothing to push."
  when: not secrets_env_file_stat.stat.exists

- name: Read local .env file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../../.env"
  register: secrets_local_env_content
  delegate_to: localhost
  no_log: true

- name: Set env content fact
  ansible.builtin.set_fact:
    secrets_env_content: "{{ secrets_local_env_content.content | b64decode }}"
  no_log: true

- name: Check if ansible hosts file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
  register: secrets_hosts_file_stat
  delegate_to: localhost

- name: Read ansible hosts file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
  register: secrets_local_hosts_content
  when: secrets_hosts_file_stat.stat.exists
  delegate_to: localhost
  no_log: true

- name: Set hosts content fact
  ansible.builtin.set_fact:
    secrets_hosts_content: "{{ secrets_local_hosts_content.content | b64decode }}"
  when: secrets_hosts_file_stat.stat.exists
  no_log: true

- name: Check if ansible SSH config exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
  register: secrets_ssh_file_stat
  delegate_to: localhost

- name: Read ansible SSH config file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
  register: secrets_local_ssh_content
  when: secrets_ssh_file_stat.stat.exists
  delegate_to: localhost
  no_log: true

- name: Set SSH config content fact
  ansible.builtin.set_fact:
    secrets_ssh_content: "{{ secrets_local_ssh_content.content | b64decode }}"
  when: secrets_ssh_file_stat.stat.exists
  no_log: true

- name: Push to adapter
  ansible.builtin.include_tasks: "adapters/{{ secret_provider }}.yml"
  vars:
    adapter_action: push
  no_log: true
