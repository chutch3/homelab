---
# ansible/roles/secrets/tasks/push.yml
# Push local secret files to the secret provider

- name: Validate configuration
  ansible.builtin.include_tasks: validate-config.yml

- name: Define managed secret files
  ansible.builtin.set_fact:
    secrets_managed_files:
      - src: "{{ playbook_dir }}/../../.env"
        attachment: "secrets.env"
        dest: "{{ playbook_dir }}/../../.env"
        required: true
      - src: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
        attachment: "hosts.yml"
        dest: "{{ playbook_dir }}/../../ansible/inventory/02-hosts.yml"
        required: false
      - src: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
        attachment: "ansible-ssh.yml"
        dest: "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/ssh.yml"
        required: false

- name: Check secret files existence
  ansible.builtin.stat:
    path: "{{ item.src }}"
  register: secrets_file_stat
  loop: "{{ secrets_managed_files }}"
  loop_control:
    label: "{{ item.attachment }}"

- name: Fail if required file is missing
  ansible.builtin.fail:
    msg: "Required secret file not found: {{ item.item.src }}"
  when: item.item.required and not item.stat.exists
  loop: "{{ secrets_file_stat.results }}"
  loop_control:
    label: "{{ item.item.attachment }}"

- name: Read existing secret files
  ansible.builtin.slurp:
    src: "{{ item.item.src }}"
  register: secrets_file_read
  when: item.stat.exists
  loop: "{{ secrets_file_stat.results }}"
  loop_control:
    label: "{{ item.item.attachment }}"
  no_log: true

- name: Build push payload
  ansible.builtin.set_fact:
    secrets_push_files: "{{ secrets_push_files | default([]) + [{'attachment': item.item.item.attachment, 'content': item.content | b64decode}] }}"
  when: not (item.skipped | default(false))
  loop: "{{ secrets_file_read.results }}"
  loop_control:
    label: "{{ item.item.item.attachment }}"
  no_log: true

- name: Push to adapter
  ansible.builtin.include_tasks: "adapters/{{ secret_provider }}.yml"
  vars:
    adapter_action: push
  no_log: true
