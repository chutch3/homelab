---
# ansible/roles/secrets/tasks/validate-config.yml
# Validates that the secret management configuration is correct

- name: Secrets | Validate secret_provider is defined
  ansible.builtin.fail:
    msg: |
      The 'secret_provider' variable is not defined or is empty.
      Ensure you have configured it in 'ansible/inventory/group_vars/all/main.yml'
      and that you are passing '-i ansible/inventory/' to your ansible command.
  when: secret_provider is not defined or secret_provider | length == 0

- name: Secrets | Validate secret_vault_item is defined
  ansible.builtin.fail:
    msg: |
      The 'secret_vault_item' variable is not defined or is empty.
      This should be the name of the item in your vault (e.g., 'Homelab Secrets').
  when: secret_vault_item is not defined or secret_vault_item | length == 0

- name: Secrets | Check if provider adapter exists
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/adapters/{{ secret_provider }}.yml"
  register: secrets_adapter_stat

- name: Secrets | Fail if adapter is missing
  ansible.builtin.fail:
    msg: |
      The secret provider adapter '{{ secret_provider }}' was not found.
      Checked path: ansible/roles/secrets/tasks/adapters/{{ secret_provider }}.yml
      Supported providers: bitwarden
  when: not secrets_adapter_stat.stat.exists
