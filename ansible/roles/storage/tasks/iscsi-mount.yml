---
# ansible/roles/storage/tasks/iscsi-mount.yml
# Loop-based iSCSI mounting - eliminates 427 lines of duplication!

# Login and wait for block devices (shared with repair-storage.yml)
- name: Login to iSCSI targets and wait for block devices
  ansible.builtin.include_tasks: iscsi-login.yml

# Check current filesystem types
- name: Check if iSCSI devices have filesystems
  ansible.builtin.command: "blkid -o value -s TYPE /dev/disk/by-path/ip-{{ iscsi_target_ip }}:{{ iscsi_target_port }}-iscsi-{{ item.iqn }}-lun-1"
  loop: "{{ storage_iscsi_mounts }}"
  register: storage_current_fstype
  failed_when: false
  changed_when: false
  when:
    - item.enabled | bool
    - item.iqn is defined

# Create OCFS2 filesystems (only if not already OCFS2)
- name: Create OCFS2 filesystems on iSCSI devices
  ansible.builtin.shell: "echo y | mkfs.ocfs2 -F --cluster-stack=o2cb --cluster-name=homelab -L {{ item.item.label }} -N 4 /dev/disk/by-path/ip-{{ iscsi_target_ip }}:{{ iscsi_target_port }}-iscsi-{{ item.item.iqn }}-lun-1"
  loop: "{{ storage_current_fstype.results }}"
  when:
    - item.item.enabled | bool
    - item.stdout != "ocfs2"
  run_once: true
  delegate_to: "{{ groups['managers'][0] }}"

# Create mount points
- name: Create iSCSI mount points
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    mode: "0755"
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined

# Add to /etc/fstab
- name: Add OCFS2 devices to /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^/dev/disk/by-path/ip-{{ iscsi_target_ip }}:{{ iscsi_target_port }}-iscsi-{{ item.iqn }}-lun-1 "
    line: "/dev/disk/by-path/ip-{{ iscsi_target_ip }}:{{ iscsi_target_port }}-iscsi-{{ item.iqn }}-lun-1 {{ item.mount_path }} ocfs2 _netdev,heartbeat=local 0 0"
    state: present
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.iqn is defined

# Start OCFS2 cluster services before mounting
- name: Start OCFS2 cluster services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - o2cb
    - ocfs2

# Mount OCFS2 filesystems
- name: Mount OCFS2 filesystems
  ansible.posix.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/disk/by-path/ip-{{ iscsi_target_ip }}:{{ iscsi_target_port }}-iscsi-{{ item.iqn }}-lun-1"
    fstype: ocfs2
    opts: _netdev,heartbeat=local
    state: mounted
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_mount_result

# Verify mounts are accessible
- name: Verify mounts are accessible
  ansible.builtin.stat:
    path: "{{ item.mount_path }}"
  loop: "{{ storage_iscsi_mounts }}"
  register: storage_mount_stat
  failed_when:
    - item.enabled | bool
    - not storage_mount_stat.stat.exists
  when: item.enabled | bool

# Test write access to mounts
- name: Test write access to mounts
  ansible.builtin.file:
    path: "{{ item.mount_path }}/.write_test_{{ inventory_hostname }}"
    state: touch
    mode: '0644'
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_write_test

# Clean up write test files
- name: Clean up write test files
  ansible.builtin.file:
    path: "{{ item.mount_path }}/.write_test_{{ inventory_hostname }}"
    state: absent
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined

# Cluster test: Create file on manager and verify on all nodes
- name: Create cluster test file on manager
  ansible.builtin.copy:
    content: "OCFS2 cluster test from {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"
    dest: "{{ iscsi_mount_path }}/.cluster-test-{{ inventory_hostname }}.txt"
    mode: '0644'
  when:
    - iscsi_enabled | default(false)
    - iscsi_mount_path is defined
  run_once: true
  delegate_to: "{{ groups['managers'][0] }}"

- name: Wait for filesystem sync
  ansible.builtin.pause:
    seconds: 2
  when: iscsi_enabled | default(false)

- name: Verify cluster test file is visible on all nodes
  ansible.builtin.stat:
    path: "{{ iscsi_mount_path }}/.cluster-test-{{ groups['managers'][0] }}.txt"
  register: storage_cluster_test_file
  when:
    - iscsi_enabled | default(false)
    - iscsi_mount_path is defined
  failed_when:
    - not storage_cluster_test_file.stat.exists

- name: Display cluster test results
  ansible.builtin.debug:
    msg: "✓ OCFS2 cluster working! File from {{ groups['managers'][0] }} is visible on {{ inventory_hostname }}"
  when:
    - iscsi_enabled | default(false)
    - storage_cluster_test_file.stat.exists

- name: Clean up cluster test file
  ansible.builtin.file:
    path: "{{ iscsi_mount_path }}/.cluster-test-{{ groups['managers'][0] }}.txt"
    state: absent
  when:
    - iscsi_enabled | default(false)
    - iscsi_mount_path is defined
  run_once: true
  delegate_to: "{{ groups['managers'][0] }}"

# Ensure Docker waits for iSCSI mounts before starting
# Without this, Docker can race the mounts on boot and containers using
# iSCSI-backed volumes will fail to start.
- name: Create Docker systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"

- name: Configure Docker to wait for iSCSI mounts
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service.d/iscsi-wait.conf
    content: |
      [Unit]
      After=remote-fs.target open-iscsi.service
      Requires=open-iscsi.service
    mode: "0644"
  notify: reload systemd

# Display mount summary
- name: Display mount summary
  ansible.builtin.debug:
    msg: "✓ iSCSI/OCFS2 setup complete - {{ storage_iscsi_mounts | selectattr('enabled') | list | length }} mount(s) active and verified"
