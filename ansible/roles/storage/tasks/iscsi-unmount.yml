---
# ansible/roles/storage/tasks/iscsi-unmount.yml
# Safely unmount iSCSI/OCFS2 storage with verification.
#
# Critical sequence — order is non-negotiable:
#   1. Stop Docker (releases file handles on OCFS2 volumes)
#   2. sync (flush dirty pages before unmount)
#   3. Unmount OCFS2 (with fallback: kill blockers and retry with force)
#   4. VERIFY mounts are gone (mountpoint check on each path)
#   5. o2cb offline (gracefully leave cluster, commit journal)
#   6. VERIFY O2CB is offline
#   7. Stop ocfs2 then o2cb services
#   8. Drop page cache (release kernel references to iSCSI blocks)
#   9. Logout iSCSI
#   10. VERIFY no active sessions
#   11. sync again (final flush)
#
# Each VERIFY step will abort if the preceding step did not actually complete.
# This prevents silent failures from cascading into data corruption.

# ── Step 1: Stop Docker ────────────────────────────────────────────────────

- name: Stop Docker daemon
  ansible.builtin.systemd:
    name: docker
    state: stopped
  ignore_errors: true

- name: Wait for Docker to fully stop (poll up to 90s)
  ansible.builtin.command: systemctl is-active docker
  register: storage_docker_status
  until: storage_docker_status.stdout == "inactive"
  retries: 18
  delay: 5
  changed_when: false
  failed_when: false

- name: Assert Docker is stopped
  ansible.builtin.assert:
    that: storage_docker_status.stdout == "inactive"
    fail_msg: "Docker still active after 90s — containers may be holding OCFS2 file handles open"
    success_msg: "✓ Docker stopped"

# ── Step 2: Define mounts and flush ────────────────────────────────────────

- name: Define iSCSI mount configurations
  ansible.builtin.set_fact:
    storage_iscsi_mounts:
      - name: media-apps
        enabled: "{{ iscsi_enabled | default(false) }}"
        iqn: "{{ iscsi_target_iqn }}"
        mount_path: "{{ iscsi_mount_path }}"
      - name: app-data
        enabled: "{{ iscsi_app_data_enabled | default(false) }}"
        iqn: "{{ iscsi_app_data_iqn }}"
        mount_path: "{{ iscsi_app_data_mount_path }}"
      - name: cache
        enabled: "{{ iscsi_cache_enabled | default(false) }}"
        iqn: "{{ iscsi_cache_iqn }}"
        mount_path: "{{ iscsi_cache_mount_path }}"

- name: Read O2CB cluster name
  ansible.builtin.command: o2cb list-clusters
  register: storage_o2cb_cluster_name
  changed_when: false
  failed_when: storage_o2cb_cluster_name.stdout == ""

- name: Flush filesystem buffers before unmounting
  ansible.builtin.command: sync
  changed_when: false

# ── Step 3: Unmount OCFS2 ──────────────────────────────────────────────────

- name: Unmount OCFS2 filesystems (clean attempt)
  ansible.posix.mount:
    path: "{{ item.mount_path }}"
    state: unmounted
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_unmount_result
  failed_when: false

# Sync after unmount attempt — ensures kernel finishes processing before we check
- name: Sync after unmount attempt
  ansible.builtin.command: sync
  changed_when: false

# Use mountpoint -q per path — more reliable than parsing mount output which can lag
- name: Check which mount points are still active after clean attempt
  ansible.builtin.command: mountpoint -q {{ item.mount_path }}
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_mountpoint_after_first
  # mountpoint -q returns 0 if still mounted, 1 if not — we want 1 (unmounted)
  changed_when: false
  failed_when: false

# Only kill blockers if a mount point is genuinely still active
- name: Kill processes blocking OCFS2 unmount
  ansible.builtin.command: fuser -km {{ item.item.mount_path }}
  loop: "{{ storage_mountpoint_after_first.results }}"
  when:
    - item.item.enabled | bool
    - item.item.mount_path is defined
    - item.rc == 0
  failed_when: false
  changed_when: true

- name: Force unmount remaining OCFS2 filesystems
  ansible.builtin.command: umount -f {{ item.item.mount_path }}
  loop: "{{ storage_mountpoint_after_first.results }}"
  when:
    - item.item.enabled | bool
    - item.item.mount_path is defined
    - item.rc == 0
  failed_when: false
  changed_when: true

# ── Step 4: VERIFY mounts are gone ────────────────────────────────────────

- name: Verify each mount point is no longer active
  ansible.builtin.command: mountpoint -q {{ item.mount_path }}
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_mountpoint_check
  # mountpoint -q returns 0 if IS a mountpoint, 1 if NOT — we want 1 (unmounted)
  failed_when: storage_mountpoint_check.rc == 0
  changed_when: false

- name: Verify mount directories are empty (no iSCSI data visible)
  ansible.builtin.find:
    paths: "{{ item.mount_path }}"
    file_type: any
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_mount_dir_contents

- name: Assert mount directories are empty after unmount
  ansible.builtin.assert:
    that: item.files | length == 0
    fail_msg: >-
      {{ item.item.mount_path }} still has {{ item.files | length }} entries —
      unmount may have silently failed or stale data is visible
    success_msg: "✓ {{ item.item.mount_path }} is empty — unmounted cleanly"
  loop: "{{ storage_mount_dir_contents.results }}"
  when:
    - item.item.enabled | bool
    - item.skipped is not defined or not item.skipped

# ── Step 5: Take O2CB cluster offline ─────────────────────────────────────

- name: Take O2CB cluster offline gracefully
  ansible.builtin.command: o2cb offline {{ storage_o2cb_cluster_name.stdout }}
  register: storage_o2cb_offline
  changed_when: storage_o2cb_offline.rc == 0
  failed_when: false

# ── Step 6: VERIFY O2CB is offline ────────────────────────────────────────

- name: Wait for O2CB cluster to go offline
  ansible.builtin.command: o2cb cluster-status {{ storage_o2cb_cluster_name.stdout }}
  register: storage_o2cb_status
  until: "'offline' in storage_o2cb_status.stdout | lower or storage_o2cb_status.rc != 0"
  retries: 6
  delay: 5
  changed_when: false
  failed_when: false

- name: Assert O2CB cluster is offline
  ansible.builtin.assert:
    that: >-
      'offline' in storage_o2cb_status.stdout | lower
      or storage_o2cb_status.rc != 0
    fail_msg: >-
      O2CB cluster '{{ storage_o2cb_cluster_name.stdout }}' did not go offline —
      iSCSI disconnect may corrupt OCFS2 journal
    success_msg: "✓ O2CB cluster '{{ storage_o2cb_cluster_name.stdout }}' is offline"

# ── Step 7: Stop services ──────────────────────────────────────────────────

- name: Stop OCFS2 cluster services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - ocfs2
    - o2cb
  ignore_errors: true

# ── Step 8: Drop page cache ────────────────────────────────────────────────

- name: Drop page cache to release kernel references to iSCSI blocks
  ansible.builtin.shell: sync && echo 3 > /proc/sys/vm/drop_caches
  changed_when: false

- name: Remove OCFS2 fstab entries
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: ".*{{ item.mount_path }}.*ocfs2.*"
    state: absent
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined

# ── Step 9: Logout iSCSI ──────────────────────────────────────────────────

- name: Logout from all iSCSI sessions
  ansible.builtin.command: iscsiadm -m session -u
  register: storage_iscsi_logout
  changed_when: storage_iscsi_logout.rc == 0
  failed_when: false

- name: Stop open-iscsi service
  ansible.builtin.systemd:
    name: open-iscsi
    state: stopped
  ignore_errors: true

# ── Step 10: VERIFY no active iSCSI sessions ──────────────────────────────

- name: Check for active iSCSI sessions
  ansible.builtin.command: iscsiadm -m session
  register: storage_active_sessions
  changed_when: false
  failed_when: false

- name: Assert no iSCSI sessions remain
  ansible.builtin.assert:
    that: storage_active_sessions.rc != 0
    fail_msg: "iSCSI sessions still active after logout: {{ storage_active_sessions.stdout }}"
    success_msg: "✓ All iSCSI sessions terminated"

- name: Remove iSCSI node configurations
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/iscsi/nodes
    - /etc/iscsi/send_targets
  ignore_errors: true

# ── Step 11: Final flush ───────────────────────────────────────────────────

- name: Final sync after all storage teardown
  ansible.builtin.command: sync
  changed_when: false

- name: Display unmount summary
  ansible.builtin.debug:
    msg: |
      ✓ iSCSI/OCFS2 teardown complete:
        - Docker stopped and verified
        - OCFS2 unmounted and mount directories confirmed empty
        - O2CB cluster '{{ storage_o2cb_cluster_name.stdout }}' taken offline gracefully
        - Page cache dropped
        - iSCSI sessions terminated and verified
        - Configuration cleaned
