---
# ansible/roles/storage/tasks/iscsi-unmount.yml
# Safely unmount iSCSI/OCFS2 storage with verification.
#
# Critical sequence — order is non-negotiable:
#   1. Stop Docker (releases file handles on OCFS2 volumes)
#   2. sync (flush dirty pages before unmount)
#   3. Unmount OCFS2 (with fallback: kill blockers and retry)
#   4. o2cb offline (gracefully leave cluster, commit journal)
#   5. Stop ocfs2 then o2cb services
#   6. Drop page cache (release kernel references to iSCSI blocks)
#   7. Logout iSCSI (safe now — no kernel references remain)
#   8. sync again (final flush)
#
# Skipping or reordering steps 3-4 causes dirty OCFS2 journals and
# fsck failures on the local NVMe at next boot.

- name: Stop Docker daemon
  ansible.builtin.systemd:
    name: docker
    state: stopped
  ignore_errors: true

- name: Wait for Docker to fully release file handles
  ansible.builtin.pause:
    seconds: 5

- name: Define iSCSI mount configurations
  ansible.builtin.set_fact:
    storage_iscsi_mounts:
      - name: media-apps
        enabled: "{{ iscsi_enabled | default(false) }}"
        iqn: "{{ iscsi_target_iqn }}"
        mount_path: "{{ iscsi_mount_path }}"
      - name: app-data
        enabled: "{{ iscsi_app_data_enabled | default(false) }}"
        iqn: "{{ iscsi_app_data_iqn }}"
        mount_path: "{{ iscsi_app_data_mount_path }}"
      - name: cache
        enabled: "{{ iscsi_cache_enabled | default(false) }}"
        iqn: "{{ iscsi_cache_iqn }}"
        mount_path: "{{ iscsi_cache_mount_path }}"

- name: Flush filesystem buffers before unmounting
  ansible.builtin.command: sync
  changed_when: false

# First attempt: clean unmount
- name: Unmount OCFS2 filesystems
  ansible.posix.mount:
    path: "{{ item.mount_path }}"
    state: unmounted
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
  register: storage_unmount_result
  failed_when: false

# Check if any mounts are still active
- name: Check for remaining OCFS2 mounts after first attempt
  ansible.builtin.command: mount
  register: storage_mounts_after_first
  changed_when: false

# If clean unmount failed, kill blockers and retry with force
- name: Kill processes blocking OCFS2 unmount
  ansible.builtin.command: fuser -km {{ item.mount_path }}
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
    - "'ocfs2' in storage_mounts_after_first.stdout"
  failed_when: false
  changed_when: true

- name: Force unmount remaining OCFS2 filesystems if still mounted
  ansible.builtin.command: umount -f {{ item.mount_path }}
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined
    - "'ocfs2' in storage_mounts_after_first.stdout"
  failed_when: false
  changed_when: true

# Take O2CB cluster offline AFTER filesystems are unmounted.
# This commits any remaining journal entries and releases cluster locks.
- name: Take O2CB cluster offline gracefully
  ansible.builtin.command: o2cb offline homelab
  register: storage_o2cb_offline
  changed_when: storage_o2cb_offline.rc == 0
  failed_when: false

- name: Wait for O2CB cluster to go offline
  ansible.builtin.command: o2cb cluster-status homelab
  register: storage_o2cb_status
  until: "'offline' in storage_o2cb_status.stdout | lower or storage_o2cb_status.rc != 0"
  retries: 6
  delay: 5
  changed_when: false
  failed_when: false

- name: Stop OCFS2 cluster services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - ocfs2
    - o2cb
  ignore_errors: true

# Verify filesystems are unmounted before touching iSCSI
- name: Check for remaining OCFS2 mounts
  ansible.builtin.command: mount
  register: storage_current_mounts
  changed_when: false

- name: Fail if OCFS2 still mounted — unsafe to disconnect iSCSI
  ansible.builtin.assert:
    that:
      - "'ocfs2' not in storage_current_mounts.stdout"
    fail_msg: "OCFS2 filesystems still mounted — aborting iSCSI disconnect to prevent data corruption"
    success_msg: "✓ All OCFS2 filesystems unmounted"

# Drop page cache to release all kernel references to iSCSI block devices
# before logging out. Without this, the kernel may still have dirty pages
# referencing iSCSI blocks which causes errors on logout.
- name: Drop page cache to release iSCSI block references
  ansible.builtin.shell: sync && echo 3 > /proc/sys/vm/drop_caches
  changed_when: false

- name: Remove OCFS2 fstab entries
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: ".*{{ item.mount_path }}.*ocfs2.*"
    state: absent
  loop: "{{ storage_iscsi_mounts }}"
  when:
    - item.enabled | bool
    - item.mount_path is defined

- name: Logout from all iSCSI sessions
  ansible.builtin.command: iscsiadm -m session -u
  register: storage_iscsi_logout
  changed_when: storage_iscsi_logout.rc == 0
  failed_when: false

- name: Stop open-iscsi service
  ansible.builtin.systemd:
    name: open-iscsi
    state: stopped
  ignore_errors: true

- name: Check for active iSCSI sessions
  ansible.builtin.command: iscsiadm -m session
  register: storage_active_sessions
  changed_when: false
  failed_when: false

- name: Verify no iSCSI sessions remain
  ansible.builtin.assert:
    that:
      - storage_active_sessions.rc != 0
    fail_msg: "WARNING: iSCSI sessions still active: {{ storage_active_sessions.stdout }}"
    success_msg: "✓ All iSCSI sessions terminated"
  ignore_errors: yes

- name: Remove iSCSI node configurations
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/iscsi/nodes
    - /etc/iscsi/send_targets
  ignore_errors: true

- name: Final sync after all storage teardown
  ansible.builtin.command: sync
  changed_when: false

- name: Display unmount summary
  ansible.builtin.debug:
    msg: |
      ✓ iSCSI/OCFS2 teardown complete:
        - OCFS2 unmounted (clean then forced if needed)
        - O2CB cluster taken offline gracefully
        - Page cache dropped
        - iSCSI sessions: {{ 'logged out' if storage_iscsi_logout.changed | default(false) else 'already clear' }}
        - Configuration cleaned
