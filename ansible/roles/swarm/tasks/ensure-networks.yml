---
# ansible/roles/swarm/tasks/ensure-networks.yml
# Ensures required overlay networks exist before deploying stacks.
# Safe to run on an already-configured cluster — idempotent.

- name: Ensure traefik-public overlay network exists
  ansible.builtin.command:
    cmd: docker --context "{{ swarm_docker_context }}" network create --driver overlay --attachable traefik-public
  delegate_to: localhost
  run_once: true
  register: swarm_traefik_network
  changed_when: swarm_traefik_network.rc == 0
  failed_when:
    - swarm_traefik_network.rc != 0
    - '"already exists" not in swarm_traefik_network.stderr'

- name: Report network status
  ansible.builtin.debug:
    msg: "{{ '✓ traefik-public network created' if swarm_traefik_network.changed else '✓ traefik-public network already exists' }}"
  run_once: true
