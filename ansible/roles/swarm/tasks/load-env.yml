---
# ansible/roles/swarm/tasks/load-env.yml
# Load and parse the root .env file into the env_vars fact.
# Called by deploy/stacks.yml and deploy/stack.yml.

- name: Load .env file
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../../../.env"
  register: swarm_env_file_content

- name: Parse environment variables from .env
  ansible.builtin.set_fact:
    swarm_env_vars: "{{ dict(swarm_env_file_content.content | b64decode | regex_findall('^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', multiline=True)) }}"
