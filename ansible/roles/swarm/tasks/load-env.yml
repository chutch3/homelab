---
# ansible/roles/swarm/tasks/load-env.yml
# Load and parse the root .env file into the env_vars fact.
# Called by deploy/stacks.yml and deploy/stack.yml.

- name: Load and parse .env file
  ansible.builtin.set_fact:
    swarm_env_vars: "{{ dict(lookup('file', role_path ~ '/../../../.env') | regex_findall('^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', multiline=True)) }}"
