---
# ansible/roles/uptime_kuma/tasks/add-service-monitors.yml
# Create Uptime Kuma monitors with verification

- name: Find all docker-compose.yml files
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../stacks/apps"
    patterns: "docker-compose.yml"
    recurse: yes
  register: uptime_kuma_compose_files
  delegate_to: localhost
  when: stack_name is not defined

- name: Use specific compose file when stack_name is defined
  ansible.builtin.set_fact:
    uptime_kuma_compose_files:
      files:
        - path: "{{ compose_file_path | default(playbook_dir + '/../../stacks/apps/' + stack_name + '/docker-compose.yml') }}"
  when: stack_name is defined

- name: Parse compose files for service monitoring configs
  ansible.builtin.shell: |
    python3 << 'EOF'
    import yaml, re, json, sys

    with open('{{ item.path }}') as f:
        try:
            compose = yaml.safe_load(f)
        except Exception:
            sys.exit(0)

    if not compose or 'services' not in compose:
        sys.exit(0)

    for svc_name, svc in (compose.get('services') or {}).items():
        if not svc:
            continue
        raw_labels = (svc.get('deploy') or {}).get('labels') or svc.get('labels') or []

        if isinstance(raw_labels, list):
            labels = {}
            for label in raw_labels:
                if '=' in str(label):
                    k, _, v = str(label).partition('=')
                    labels[k.strip()] = v.strip()
        elif isinstance(raw_labels, dict):
            labels = dict(raw_labels)
        else:
            labels = {}

        domain = None
        for k, v in labels.items():
            if re.match(r'traefik\.http\.routers\..+\.rule', k):
                m = re.search(r"Host\(`([^`]+)`\)", str(v))
                if m:
                    domain = m.group(1).replace('${BASE_DOMAIN}', '{{ base_domain }}')
                    break

        if domain:
            path = labels.get('uptime_kuma.path', '')
            accepted_statuscodes_raw = labels.get('uptime_kuma.accepted_statuscodes', '')
            accepted_statuscodes = [s.strip() for s in accepted_statuscodes_raw.split(',')] if accepted_statuscodes_raw else []
            print(json.dumps({"domain": domain, "path": path, "accepted_statuscodes": accepted_statuscodes}))
    EOF
  loop: "{{ uptime_kuma_compose_files.files }}"
  register: uptime_kuma_service_config_raw
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Build discovered services list
  ansible.builtin.set_fact:
    uptime_kuma_discovered_services: >-
      {{ uptime_kuma_service_config_raw.results
         | map(attribute='stdout_lines') | flatten
         | select('ne', '') | map('from_json') | list }}
    uptime_kuma_discovered_domains: >-
      {{ uptime_kuma_service_config_raw.results
         | map(attribute='stdout_lines') | flatten
         | select('ne', '') | map('from_json')
         | map(attribute='domain') | unique | list }}

- name: Display discovered services
  ansible.builtin.debug:
    msg: "Discovered {{ uptime_kuma_discovered_services | length }} service(s) to monitor: {{ uptime_kuma_discovered_services | map(attribute='domain') | join(', ') }}"

# =========================================================================
# PHASE 1: Create Monitors
# =========================================================================

# Workaround for lucasheld.uptime_kuma bug: object_changed() compares lists
# element-by-element without a bounds check, crashing when accepted_statuscodes
# lengths differ. We fetch existing monitors first and only pre-delete ones
# where the stored statuscodes actually differ from desired, so history is
# preserved on idempotent runs.
- name: "[PRE] Fetch existing monitors to detect accepted_statuscodes mismatch"
  lucasheld.uptime_kuma.monitor_info:
    api_url: "{{ uptime_kuma_api_url }}"
    api_token: "{{ uptime_kuma_api_token }}"
    api_timeout: 30
  register: uptime_kuma_pre_monitors
  delegate_to: localhost
  failed_when: false

- name: "[PRE] Identify monitors with stale accepted_statuscodes"
  ansible.builtin.shell: |
    python3 << 'EOF'
    import json, os

    existing = json.loads(os.environ['EXISTING_MONITORS'])
    desired = json.loads(os.environ['DESIRED_SERVICES'])

    existing_codes = {m['name']: m.get('accepted_statuscodes', []) for m in existing}

    to_recreate = [
        svc for svc in desired
        if svc['accepted_statuscodes']
        and svc['domain'] in existing_codes
        and existing_codes[svc['domain']] != svc['accepted_statuscodes']
    ]

    print(json.dumps(to_recreate))
    EOF
  environment:
    EXISTING_MONITORS: "{{ uptime_kuma_pre_monitors.monitors | default([]) | to_json }}"
    DESIRED_SERVICES: "{{ uptime_kuma_discovered_services | to_json }}"
  register: uptime_kuma_monitors_to_recreate_raw
  changed_when: false
  delegate_to: localhost

- name: "[PRE] Set monitors to recreate"
  ansible.builtin.set_fact:
    uptime_kuma_monitors_to_recreate: "{{ uptime_kuma_monitors_to_recreate_raw.stdout | from_json }}"

- name: "[PRE] Remove monitors with stale accepted_statuscodes"
  lucasheld.uptime_kuma.monitor:
    api_url: "{{ uptime_kuma_api_url }}"
    api_token: "{{ uptime_kuma_api_token }}"
    name: "{{ item.domain }}"
    state: absent
  loop: "{{ uptime_kuma_monitors_to_recreate }}"
  delegate_to: localhost
  register: uptime_kuma_delete_result
  retries: 3
  delay: 10
  until: uptime_kuma_delete_result is succeeded

- name: "[MONITOR] Add HTTP monitor for each discovered service"
  lucasheld.uptime_kuma.monitor:
    api_url: "{{ uptime_kuma_api_url }}"
    api_token: "{{ uptime_kuma_api_token }}"
    name: "{{ item.domain }}"
    type: http
    url: "https://{{ item.domain }}{{ item.path }}"
    accepted_statuscodes: "{{ item.accepted_statuscodes if item.accepted_statuscodes | length > 0 else omit }}"
    parent_name: Services
    interval: 60
    state: present
  loop: "{{ uptime_kuma_discovered_services }}"
  register: uptime_kuma_add_service_monitor_result
  delegate_to: localhost
  retries: 3
  delay: 5
  until: uptime_kuma_add_service_monitor_result is succeeded

- name: "[MONITOR] Display monitor creation status"
  ansible.builtin.debug:
    msg: "Monitor for {{ item.item.domain }} (url={{ item.item.domain }}{{ item.item.path }}): {{ 'Created' if item.changed else 'Already exists' }}"
  loop: "{{ uptime_kuma_add_service_monitor_result.results }}"

# =========================================================================
# PHASE 2: Wait for Monitors to Initialize
# =========================================================================
- name: "[VERIFY] Wait for monitors to initialize"
  ansible.builtin.pause:
    seconds: 30
  when: uptime_kuma_discovered_domains | length > 0

# =========================================================================
# PHASE 3: Verify Monitors Exist and Are Active
# =========================================================================
- name: "[VERIFY] Get all monitors from Uptime Kuma"
  lucasheld.uptime_kuma.monitor_info:
    api_url: "{{ uptime_kuma_api_url }}"
    api_token: "{{ uptime_kuma_api_token }}"
    api_timeout: 30
  register: uptime_kuma_all_monitors
  delegate_to: localhost
  retries: 3
  delay: 15
  until: uptime_kuma_all_monitors is succeeded

- name: "[VERIFY] Extract created monitor names"
  ansible.builtin.set_fact:
    uptime_kuma_created_monitor_names: "{{ uptime_kuma_all_monitors.monitors | map(attribute='name') | list }}"

- name: "[VERIFY] Check which monitors were successfully created"
  ansible.builtin.set_fact:
    uptime_kuma_verified_monitors: "{{ uptime_kuma_discovered_domains | select('in', uptime_kuma_created_monitor_names) | list }}"
    uptime_kuma_missing_monitors: "{{ uptime_kuma_discovered_domains | reject('in', uptime_kuma_created_monitor_names) | list }}"

- name: "[VERIFY] Display verification summary"
  ansible.builtin.debug:
    msg: |
      Monitor Verification Summary:
      ============================
      Total monitors: {{ uptime_kuma_discovered_domains | length }}
      Verified:       {{ uptime_kuma_verified_monitors | length }}
      Missing:        {{ uptime_kuma_missing_monitors | length }}
      {% if uptime_kuma_missing_monitors | length > 0 %}
      Missing monitors: {{ uptime_kuma_missing_monitors | join(', ') }}
      {% endif %}

- name: "[VERIFY] Warn about missing monitors"
  ansible.builtin.debug:
    msg: "⚠ WARNING: {{ uptime_kuma_missing_monitors | length }} monitor(s) not found in Uptime Kuma"
  when: uptime_kuma_missing_monitors | length > 0

# =========================================================================
# PHASE 4: Verify Monitor Configuration
# =========================================================================
- name: "[VERIFY-CONFIG] Get detailed monitor info for each service"
  ansible.builtin.set_fact:
    uptime_kuma_service_monitors: "{{ uptime_kuma_all_monitors.monitors | selectattr('name', 'in', uptime_kuma_discovered_domains) | list }}"

- name: "[VERIFY-CONFIG] Verify monitor is active"
  ansible.builtin.debug:
    msg: "✓ Monitor '{{ item.name }}': Active={{ item.active | default(false) }}, Type={{ item.type }}, URL={{ item.url }}"
  loop: "{{ uptime_kuma_service_monitors }}"

- name: "[VERIFY-CONFIG] Check for inactive monitors"
  ansible.builtin.set_fact:
    uptime_kuma_inactive_monitors: "{{ uptime_kuma_service_monitors | rejectattr('active', 'equalto', true) | map(attribute='name') | list }}"

- name: "[VERIFY-CONFIG] Warn about inactive monitors"
  ansible.builtin.debug:
    msg: "⚠ WARNING: Monitor '{{ item }}' exists but is INACTIVE"
  loop: "{{ uptime_kuma_inactive_monitors }}"
  when: uptime_kuma_inactive_monitors | length > 0

# =========================================================================
# PHASE 5: Check Monitor Status (if available)
# =========================================================================
- name: "[STATUS] Get monitor heartbeats (latest status)"
  lucasheld.uptime_kuma.monitor_info:
    api_url: "{{ uptime_kuma_api_url }}"
    api_token: "{{ uptime_kuma_api_token }}"
    api_timeout: 30
    id: "{{ item.id }}"
  loop: "{{ uptime_kuma_service_monitors }}"
  register: uptime_kuma_monitor_heartbeats
  delegate_to: localhost
  retries: 3
  delay: 15
  until: uptime_kuma_monitor_heartbeats is succeeded
  failed_when: false

- name: "[STATUS] Display monitor status"
  ansible.builtin.debug:
    msg: "Monitor '{{ item.item.name }}': Last Status={{ item.monitor.status | default('pending') }}"
  loop: "{{ uptime_kuma_monitor_heartbeats.results }}"
  when: item.monitor is defined

# =========================================================================
# PHASE 6: Final Summary
# =========================================================================
- name: "[SUMMARY] Calculate summary statistics"
  ansible.builtin.set_fact:
    uptime_kuma_total_monitors: "{{ uptime_kuma_discovered_domains | length }}"
    uptime_kuma_created_count: "{{ uptime_kuma_add_service_monitor_result.results | selectattr('changed', 'equalto', true) | list | length }}"
    uptime_kuma_existing_count: "{{ uptime_kuma_add_service_monitor_result.results | rejectattr('changed', 'equalto', true) | list | length }}"
    uptime_kuma_active_count: "{{ uptime_kuma_service_monitors | selectattr('active', 'equalto', true) | list | length }}"

- name: "[SUMMARY] Display final summary"
  ansible.builtin.debug:
    msg: |

      ╔══════════════════════════════════════════════════════════════╗
      ║          UPTIME KUMA REGISTRATION COMPLETE
      ╚══════════════════════════════════════════════════════════════╝

      Services Discovered: {{ uptime_kuma_total_monitors }}
      Newly Created:       {{ uptime_kuma_created_count }}
      Already Existed:     {{ uptime_kuma_existing_count }}
      Active Monitors:     {{ uptime_kuma_active_count }}

      {% if uptime_kuma_missing_monitors | length > 0 %}
      ⚠ Missing:  {{ uptime_kuma_missing_monitors | length }} ({{ uptime_kuma_missing_monitors | join(', ') }})
      {% endif %}
      {% if uptime_kuma_inactive_monitors | length > 0 %}
      ⚠ Inactive: {{ uptime_kuma_inactive_monitors | length }} ({{ uptime_kuma_inactive_monitors | join(', ') }})
      {% endif %}

      {% if uptime_kuma_missing_monitors | length == 0 and uptime_kuma_inactive_monitors | length == 0 %}
      ✅ All monitors created, verified, and active
      {% else %}
      ⚠ Some monitors require attention
      {% endif %}

      Access Uptime Kuma: {{ uptime_kuma_api_url }}
