site_name: Homelab
site_url: https://chutch3.github.io/homelab/
repo_url: https://github.com/chutch3/homelab
edit_uri: edit/main/docs/
site_description: "A Docker Swarm homelab platform with 40+ pre-configured services, automatic SSL certificates via Traefik, and network storage integration."
site_author: "Cody Hutchens"

theme:
  name: material
  custom_dir: "docs/overrides"
  features:
    - content.code.copy

extra_css:
  - stylesheets/ascii-theme.css

plugins:
  - search
  - mermaid2:
      arguments:
        theme: dark
        themeVariables:
          primaryColor: '#0a0a0a'
          primaryTextColor: '#33ff33'
          primaryBorderColor: '#33ff33'
          lineColor: '#33ff33'
          secondaryColor: '#1a1a1a'
          tertiaryColor: '#0d0d0d'
          background: '#0a0a0a'
          mainBkg: '#0a0a0a'
          nodeBorder: '#33ff33'
          clusterBkg: '#0d0d0d'
          clusterBorder: '#1a5c1a'
          titleColor: '#ffcc00'
          edgeLabelBackground: '#0a0a0a'
          textColor: '#33ff33'
          actorTextColor: '#ffcc00'
          actorBorder: '#33ff33'
          actorBkg: '#0a0a0a'
          signalColor: '#33ff33'
          noteBkgColor: '#1a1a1a'
          noteTextColor: '#ffcc00'
          noteBorderColor: '#1a5c1a'
          sequenceNumberColor: '#ffcc00'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - .venv/lib/python3.10/site-packages/material/templates/.icons

nav:
  - Home: index.md
  - "Getting Started":
      - "Quick Start": "getting-started/quick-start.md"
      - "Installation": "getting-started/installation.md"
      - "Configuration": "getting-started/configuration.md"
      - "Prerequisites": "getting-started/prerequisites.md"
  - "Operations":
      - "Service Management": "user-guide/service-management.md"
      - "Shutdown & Startup": "user-guide/shutdown-startup.md"
      - "Tailscale VPN": "user-guide/tailscale.md"
      - "Troubleshooting": "troubleshooting.md"
  - "Architecture":
      - "Overview": "architecture/overview.md"
      - "Storage": "architecture/storage.md"
      - "Build & Test Pipeline": "architecture/build-pipeline.md"
  - "Services": "services/index.md"
  - "Roadmap": "roadmap.md"
