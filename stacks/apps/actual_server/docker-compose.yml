version: "3.9"

services:
    actual_server:
        image: docker.io/actualbudget/actual-server:26.5.0
        environment:
            - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
            - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
            - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
            - DEBUG=actual:config
        volumes:
            - budget:/data
            - ssl_certs:/certs
        restart: unless-stopped
        networks:
            - traefik-public
        user: 0:100
        deploy:
            endpoint_mode: dnsrr
            labels:
                - "traefik.enable=true"
                - "traefik.http.routers.actual.rule=Host(`budget.${BASE_DOMAIN}`)"
                - "traefik.http.routers.actual.entrypoints=websecure"
                - "traefik.http.routers.actual.tls.certresolver=dns"
                - "traefik.http.services.actual.loadbalancer.server.port=5006"

                - homepage.group=Finance
                - homepage.name=Actual Budget
                - homepage.icon=mdi-cash-multiple
                - homepage.href=https://budget.${BASE_DOMAIN}/
                - homepage.description=Budgeting Application

    actual_mcp:
        image: sstefanov/actual-mcp:latest
        command: ["--sse"]
        environment:
            - ACTUAL_SERVER_URL=http://actual_server:5006
            - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
            - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
            - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD}
        volumes:
            - mcp_data:/data
        networks:
            - traefik-public
        deploy:
            labels:
                - "traefik.enable=true"
                - "traefik.http.routers.actual-mcp.rule=Host(`actual-mcp.${BASE_DOMAIN}`)"
                - "traefik.http.routers.actual-mcp.entrypoints=websecure"
                - "traefik.http.routers.actual-mcp.tls.certresolver=dns"
                - "traefik.http.services.actual-mcp.loadbalancer.server.port=3000"

                - homepage.group=Finance
                - homepage.name=Actual MCP
                - homepage.icon=mdi-robot-confused
                - homepage.href=https://actual-mcp.${BASE_DOMAIN}/
                - homepage.description=Actual Budget MCP Server

networks:
    traefik-public:
        external: true

volumes:
    budget:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0,nobrl,uid=0,gid=100,file_mode=0777,dir_mode=0777,soft,actimeo=30"
            device: "//${NAS_SERVER}/budget"

    mcp_data:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/app-data/actual_server/mcp"

    ssl_certs:
        name: ssl_certs
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,file_mode=0770,dir_mode=0770,uid=1000,gid=1000,soft,actimeo=30"
            device: "//${NAS_SERVER}/ssl_certs"
