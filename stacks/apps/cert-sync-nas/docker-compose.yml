version: '3.8'

services:
  nas-cert:
    image: neilpang/acme.sh
    environment:
      - CF_Token=${CLOUDFLARE_DNS_API_TOKEN}
      - NAS_HOST=nas.${BASE_DOMAIN:-example.com}
      - NAS_USER=${NAS_USER:-root}
      - CERT_DOMAIN=nas.${BASE_DOMAIN:-example.com}
      - SSH_KEY_FILE=/root/.ssh/id_rsa
      - TZ=${TZ:-America/New_York}
      - COMMON_DIR=/scripts/common
    volumes:
      - acme_certs:/acme.sh
    configs:
      - source: cert_sync_script_v1
        target: /scripts/sync-nas-cert.sh
        mode: 0555
      - source: cert_sync_omv_v1
        target: /scripts/common/nas/omv.sh
        mode: 0555
      - source: cert_sync_install_cert_v1
        target: /scripts/common/nas/install-cert-remote.sh
        mode: 0555
      - source: cert_sync_cert_sh_v1
        target: /scripts/common/cert.sh
        mode: 0555
      - source: cert_sync_ssh_sh_v1
        target: /scripts/common/ssh.sh
        mode: 0555
    secrets:
      - source: cert_sync_ssh_key
        target: /ssh-key/id_rsa
        mode: 0400
    command: >
      sh -c "
      apk add --no-cache openssh-client bash &&
      mkdir -p /root/.ssh &&
      if [ -f /ssh-key/id_rsa ]; then
        cp /ssh-key/id_rsa /root/.ssh/id_rsa &&
        chmod 600 /root/.ssh/id_rsa;
      fi &&
      chmod 700 /root/.ssh &&
      echo 'Issuing certificate for nas.${BASE_DOMAIN:-example.com}...' &&
      (acme.sh --issue --dns dns_cf -d nas.${BASE_DOMAIN:-example.com} --server letsencrypt || echo 'Certificate already exists, skipping...') &&
      echo 'Running initial sync to NAS...' &&
      /scripts/sync-nas-cert.sh &&
      echo 'Installing crontab for weekly renewal and sync...' &&
      echo '0 3 * * 0 acme.sh --renew -d nas.${BASE_DOMAIN:-example.com}; /scripts/sync-nas-cert.sh' > /etc/crontabs/root &&
      echo 'Starting cron daemon...' &&
      crond -f
      "
    networks:
      - cert-sync
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s

volumes:
  acme_certs:
    driver: local

configs:
  cert_sync_script_v1:
    file: ./sync-nas-cert.sh
  cert_sync_omv_v1:
    file: ../../../scripts/common/nas/omv.sh
  cert_sync_install_cert_v1:
    file: ../../../scripts/common/nas/install-cert-remote.sh
  cert_sync_cert_sh_v1:
    file: ../../../scripts/common/cert.sh
  cert_sync_ssh_sh_v1:
    file: ../../../scripts/common/ssh.sh

secrets:
  cert_sync_ssh_key:
    external: true

networks:
  cert-sync:
    driver: overlay
