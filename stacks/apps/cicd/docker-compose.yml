version: "3.9"

services:
  runner:
    image: gitea/act_runner:latest
    environment:
      - GITEA_INSTANCE_URL=https://git.${BASE_DOMAIN}
      - GITEA_RUNNER_REGISTRATION_TOKEN=${FORGEJO_RUNNER_TOKEN}
      - GITEA_RUNNER_NAME=homelab-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://node:16-bullseye,self-hosted
    volumes:
      - runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - traefik-public
    restart: unless-stopped
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.cicd.rule=Host(`cicd.${BASE_DOMAIN}`)"
        - "traefik.http.routers.cicd.entrypoints=websecure"
        - "traefik.http.routers.cicd.tls.certresolver=dns"
        - "traefik.http.services.cicd.loadbalancer.server.port=8080"

        - "homepage.group=Development"
        - "homepage.name=CI/CD Runner"
        - "homepage.icon=gitea.png"
        - "homepage.href=https://git.${BASE_DOMAIN}/"
        - "homepage.description=Forgejo Actions Runner (compatible with GHA)"

networks:
  traefik-public:
    external: true

volumes:
  runner-data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/iscsi/app-data/cicd"
