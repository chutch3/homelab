version: "3.9"

services:
  code-server:
    image: ${REGISTRY_URL:-ghcr.io}/${GITHUB_USERNAME}/homelab-devbox:latest@sha256:fbc55a6043d0b18ca831290ea7723ee8755578e1082c2a1822c3efbbad7413b9
    environment:
      - TZ=${TZ:-America/New_York}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL}
      # Talk to the isolated in-stack Docker daemon (dind), NOT the homelab node socket.
      # This is what lets integration/e2e tests run a real, throwaway Postgres + Swarm locally.
      - DOCKER_HOST=tcp://dind:2375
    ports:
      - target: 22
        published: 2200
        protocol: tcp
        mode: ingress
    volumes:
      - code_server_config:/home/coder/.config/code-server
      - workspace:/home/coder/workspace
      - shared_ssh:/home/coder/.ssh
      - claude_config:/home/coder/.claude
    networks:
      - traefik-public
      - dind-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == true
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.codeserver.rule=Host(`code.${BASE_DOMAIN}`)"
        - "traefik.http.routers.codeserver.entrypoints=websecure"
        - "traefik.http.routers.codeserver.tls.certresolver=dns"
        - "traefik.http.routers.codeserver.middlewares=authentik@swarm"
        - "traefik.http.services.codeserver.loadbalancer.server.port=3001"
        - "traefik.swarm.network=traefik-public"
        - "traefik.tcp.routers.codeserver-ssh.rule=HostSNI(`*`)"
        - "traefik.tcp.routers.codeserver-ssh.entrypoints=ssh"
        - "traefik.tcp.routers.codeserver-ssh.service=codeserver-ssh"
        - "traefik.tcp.services.codeserver-ssh.loadbalancer.server.port=22"
        - "homepage.group=Development"
        - "homepage.name=Code Server"
        - "homepage.icon=vscode.png"
        - "homepage.href=https://code.${BASE_DOMAIN}/"
        - "homepage.description=Web IDE"
      restart_policy:
        condition: any
        delay: 5s

  # Isolated in-stack Docker daemon (DinD) so integration/e2e tests run a real,
  # throwaway Postgres + single-node Swarm WITHOUT touching the homelab daemon.
  # NOTE: Swarm's support for `privileged` is version-dependent; verify after deploy
  # (homeassistant uses privileged here as precedent). Reachable only on the internal
  # dind-net overlay (insecure tcp is not published off the stack).
  dind:
    image: docker:dind
    privileged: true
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind_storage:/var/lib/docker
    networks:
      - dind-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.gpu == true
      restart_policy:
        condition: any
        delay: 5s

networks:
  traefik-public:
    external: true
  dind-net:
    driver: overlay
    attachable: true

volumes:
  dind_storage:
    driver: local
  code_server_config:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/iscsi/app-data/dev-env/code-server/config"
  workspace:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/iscsi/app-data/dev-env/workspace"
  shared_ssh:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/iscsi/app-data/dev-env/shared-ssh"
  claude_config:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/iscsi/app-data/dev-env/ai-configs/claude"
