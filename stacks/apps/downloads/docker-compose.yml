version: "3.9"

services:
    vpn:
        image: qmcgaw/gluetun:v3.41.1
        container_name: downloads-vpn
        cap_add:
            - NET_ADMIN
        devices:
            - /dev/net/tun:/dev/net/tun
        entrypoint: ["/bin/sh", "/scripts/init-vpn.sh"]
        configs:
            - source: vpn_init_script_v2
              target: /scripts/init-vpn.sh
              mode: 493
        environment:
            - VPN_SERVICE_PROVIDER=${DOWNLOADS_VPN_SERVICE_PROVIDER}
            - VPN_TYPE=${DOWNLOADS_VPN_TYPE}
            - OPENVPN_USER=${DOWNLOADS_OPENVPN_USER}
            - OPENVPN_PASSWORD=${DOWNLOADS_OPENVPN_PASSWORD}
            - SERVER_COUNTRIES=${DOWNLOADS_VPN_SERVER_COUNTRIES}
            - SERVER_CATEGORIES=${DOWNLOADS_VPN_SERVER_CATEGORIES}
            - SERVER_CITIES=${DOWNLOADS_VPN_SERVER_CITIES}
            - FIREWALL_OUTBOUND_SUBNETS=${LOCAL_SUBNET},${DOWNLOADS_DOCKER_SUBNET}
            - HTTPPROXY=on
            - HTTPPROXY_LISTENING_ADDRESS=:8888
            - TZ=${TZ}
        ports:
            - "1080:1080" # dante SOCKS5 proxy port (TCP + UDP)
            - "8888:8888" # HTTP proxy port
        networks:
            - traefik-public
            - downloads-internal
        restart: unless-stopped
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true

    qbittorrent:
        image: lscr.io/linuxserver/qbittorrent:latest
        container_name: qbittorrent
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
            - WEBUI_PORT=8080
        volumes:
            - qbittorrent:/config
            - torrents:/data/torrents
        networks:
            - traefik-public
            - downloads-internal
        expose:
            - "8080"
        restart: unless-stopped
        depends_on:
            - vpn
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${BASE_DOMAIN}`)"
                - "traefik.http.routers.qbittorrent.entrypoints=websecure"
                - "traefik.http.routers.qbittorrent.tls.certresolver=dns"
                - "traefik.http.routers.qbittorrent.middlewares=authentik@swarm"
                - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
                - homepage.group=Downloads
                - homepage.name=qBittorrent
                - homepage.icon=qbittorrent.png
                - homepage.href=https://qbittorrent.${BASE_DOMAIN}/
                - homepage.description=qBittorrent Torrent Client

    deluge:
        image: lscr.io/linuxserver/deluge:latest
        container_name: deluge
        volumes:
            - deluge:/config
            - torrents:/data/torrents
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - UMASK=002
            - DELUGE_LOGLEVEL=info
        networks:
            - traefik-public
            - downloads-internal
        expose:
            - "8112"
            - "58846"
        restart: unless-stopped
        depends_on:
            - vpn
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.deluge.rule=Host(`deluge.${BASE_DOMAIN}`)"
                - "traefik.http.routers.deluge.entrypoints=websecure"
                - "traefik.http.routers.deluge.tls.certresolver=dns"
                - "traefik.http.routers.deluge.middlewares=authentik@swarm"
                - "traefik.http.services.deluge.loadbalancer.server.port=8112"
                - homepage.group=Downloads
                - homepage.name=Deluge
                - homepage.icon=deluge.png
                - homepage.href=https://deluge.${BASE_DOMAIN}/
                - homepage.description=Deluge Torrent Client

    sabnzbd:
        image: lscr.io/linuxserver/sabnzbd:latest
        container_name: sabnzbd
        configs:
            - source: sabnzbd_fix_whitelist
              target: /custom-cont-init.d/99-fix-whitelist
              mode: 493
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
            - BASE_DOMAIN=${BASE_DOMAIN}
        volumes:
            - sabnzbd:/config
            - usenet:/data/usenet
        networks:
            - traefik-public
            - downloads-internal
        expose:
            - "8080"
        restart: unless-stopped
        depends_on:
            - vpn
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.${BASE_DOMAIN}`)"
                - "traefik.http.routers.sabnzbd.entrypoints=websecure"
                - "traefik.http.routers.sabnzbd.tls.certresolver=dns"
                - "traefik.http.routers.sabnzbd.middlewares=authentik@swarm"
                - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
                - "uptime_kuma.accepted_statuscodes=200,301,302"
                - homepage.group=Downloads
                - homepage.name=SABnzbd
                - homepage.icon=sabnzbd.png
                - homepage.href=https://sabnzbd.${BASE_DOMAIN}/
                - homepage.description=SABnzbd Usenet Client

    nzbget:
        image: lscr.io/linuxserver/nzbget:latest
        container_name: nzbget
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - nzbget:/config
            - usenet:/data/usenet
        networks:
            - traefik-public
            - downloads-internal
        expose:
            - "6789"
        restart: unless-stopped
        depends_on:
            - vpn
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.nzbget.rule=Host(`nzbget.${BASE_DOMAIN}`)"
                - "traefik.http.routers.nzbget.entrypoints=websecure"
                - "traefik.http.routers.nzbget.tls.certresolver=dns"
                - "traefik.http.routers.nzbget.middlewares=authentik@swarm"
                - "traefik.http.services.nzbget.loadbalancer.server.port=6789"
                - homepage.group=Downloads
                - homepage.name=NZBGet
                - homepage.icon=nzbget.png
                - homepage.href=https://nzbget.${BASE_DOMAIN}/
                - homepage.description=NZBGet Usenet Client
    # Duplicated so that it would work inside the internal download network
    flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        container_name: downloads-flaresolverr
        environment:
            - TZ=${TZ}
            - LOG_LEVEL=${DOWNLOADS_FLARESOLVERR_LOG_LEVEL}
            - HEADLESS=true
            - HTTP_PROXY=http://vpn:8888
            - HTTPS_PROXY=http://vpn:8888
            - NO_PROXY=localhost,127.0.0.1
        depends_on:
            - vpn
        networks:
            downloads-internal:
                aliases:
                    - flaresolverr
        restart: unless-stopped
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
        shm_size: "1g"

    # === KENKU (manga downloader: single image serves UI + API on :6531) ===
    kenku-pg:
        image: postgres:15-alpine
        container_name: kenku-pg
        environment:
            - POSTGRES_USER=${DOWNLOADS_KENKU_DB_USER}
            - POSTGRES_PASSWORD=${DOWNLOADS_KENKU_DB_PASSWORD}
            - POSTGRES_DB=${DOWNLOADS_KENKU_DB_NAME}
        volumes:
            # Live data on a node-local volume (NOT the OCFS2 cluster FS). Recovery
            # is from the logical dumps written by kenku-pg-backup below.
            - kenku_pg:/var/lib/postgresql/data
        networks:
            - downloads-internal
        restart: unless-stopped
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true

    # Consistent logical backups: pg_dump on a schedule into an iSCSI dir that Kopia
    # captures (the live data dir is local and intentionally NOT backed up at the FS level).
    kenku-pg-backup:
        image: prodrigestivill/postgres-backup-local:15-alpine
        container_name: kenku-pg-backup
        environment:
            - POSTGRES_HOST=kenku-pg
            - POSTGRES_DB=${DOWNLOADS_KENKU_DB_NAME}
            - POSTGRES_USER=${DOWNLOADS_KENKU_DB_USER}
            - POSTGRES_PASSWORD=${DOWNLOADS_KENKU_DB_PASSWORD}
            - SCHEDULE=@daily
            - BACKUP_KEEP_DAYS=7
            - BACKUP_KEEP_WEEKS=4
            - BACKUP_KEEP_MONTHS=6
            - TZ=${TZ}
        volumes:
            - kenku_db_backups:/backups
        depends_on:
            - kenku-pg
        networks:
            - downloads-internal
        restart: unless-stopped
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true

    kenku:
        image: ghcr.io/chutch3/kenku:0.14.0
        container_name: kenku
        # settings.json + imageCache live under /usr/share/kenku-api and are written by the
        # app at runtime, so this is a plain writable volume (kenku_config). Configure
        # download clients / FlareSolverr / naming scheme in the UI; values persist in the
        # volume. Previous tuned defaults kept for reference at ./kenku/settings.json.
        environment:
            - POSTGRES_HOST=kenku-pg:5432
            - POSTGRES_USER=${DOWNLOADS_KENKU_DB_USER}
            - POSTGRES_PASSWORD=${DOWNLOADS_KENKU_DB_PASSWORD}
            - POSTGRES_DB=${DOWNLOADS_KENKU_DB_NAME}
            - HTTP_PROXY=http://vpn:8888
            - HTTPS_PROXY=http://vpn:8888
            - NO_PROXY=localhost,127.0.0.1
            - TZ=${TZ}
            # Rate-limit queue-wait is charged against this HTTP timeout (bug #31): at the
            # 60s default, large rate-limited series (e.g. Ichi the Killer ~200 imgs) cancel
            # mid-chapter, discard all images, and re-queue forever. Pin 600s here so the
            # mitigation survives redeploys (a `service update` env is reverted on redeploy).
            - HTTP_REQUEST_TIMEOUT=600
            # Pin the default download/library root so a settings.json reset can never
            # silently drop downloads into ephemeral container storage (was defaulting to
            # /Series). Manga lives under /series/manga, comics under /series/comics.
            - DOWNLOAD_LOCATION=/series/manga
            # Internal swarm DNS of the flaresolverr service (overlay alias + port, no Traefik).
            # WeebCentral JS-loads chapter images, so kenku must fetch via FlareSolverr or it
            # writes empty stubs. Pinned here so a settings reset can't blank it.
            - FLARESOLVERR_URL=http://flaresolverr:8191
        volumes:
            # Mounts the series/ subfolder of the torrents share, exposing the manga and
            # comics libraries at /series/manga and /series/comics.
            - series:/series
            - kenku_config:/usr/share/kenku-api
        depends_on:
            - kenku-pg
            - vpn
            - flaresolverr
        networks:
            - traefik-public
            - downloads-internal
        restart: unless-stopped
        deploy:
            placement:
                constraints:
                    - node.labels.downloads == true
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.kenku.rule=Host(`kenku.${BASE_DOMAIN}`)"
                - "traefik.http.routers.kenku.entrypoints=websecure"
                - "traefik.http.routers.kenku.tls.certresolver=dns"
                - "traefik.http.routers.kenku.middlewares=authentik@swarm"
                - "traefik.http.services.kenku.loadbalancer.server.port=6531"
                - homepage.group=Downloads
                - homepage.name=Kenku
                - homepage.icon=mdi-book-arrow-down
                - homepage.href=https://kenku.${BASE_DOMAIN}/
                - homepage.description=Manga Downloader

configs:
    vpn_init_script_v2:
        file: ./scripts/init-vpn.sh
    sabnzbd_fix_whitelist:
        file: ./sabnzbd/99-fix-whitelist
networks:
    traefik-public:
        external: true
    downloads-internal:
        driver: overlay
        attachable: true

volumes:
    torrents:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,file_mode=0770,dir_mode=0770,uid=1000,gid=1000,soft,actimeo=30,nobrl"
            device: "//${NAS_SERVER}/torrents"

    # Dedicated mount of the series/ subfolder of the torrents share, used only by kenku.
    # Exposes /series/manga and /series/comics as separate libraries, so Komga (which reads
    # the same share) and kenku agree on where chapters live.
    series:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,file_mode=0770,dir_mode=0770,uid=1000,gid=1000,soft,actimeo=30,nobrl"
            device: "//${NAS_SERVER}/torrents/series"

    usenet:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,file_mode=0770,dir_mode=0770,uid=1000,gid=1000,soft,actimeo=30,nobrl"
            device: "//${NAS_SERVER}/usenet"

    qbittorrent:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/media-apps/qbittorrent"

    deluge:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/media-apps/deluge"

    sabnzbd:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/media-apps/sabnzbd"

    nzbget:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/media-apps/nzbget"

    # Node-local volume, off the OCFS2 cluster FS (see the kenku-pg service comment).
    # Docker manages it under /var/lib/docker/volumes on the pinned downloads node.
    kenku_pg:
        driver: local

    # Writable persistence for the kenku app dir (settings.json + imageCache). Node-local;
    # the service is pinned to the downloads node. The app creates settings.json on first
    # boot; configure it through the UI (defaults reference: ./kenku/settings.json).
    kenku_config:
        driver: local

    # iSCSI/OCFS2 bind so Kopia's app-data policy captures the pg_dump archives offsite.
    kenku_db_backups:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/app-data/kenku/db-backups"
