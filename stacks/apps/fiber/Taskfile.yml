version: "3"

vars:
    STACK_DIR: "{{.TASKFILE_DIR}}"
    REGISTRY_URL: '{{.FIBER_REGISTRY_URL | default "ghcr.io"}}'
    REGISTRY_NAMESPACE: '{{.FIBER_REGISTRY_NAMESPACE | default "chutch3"}}'
    IMAGE_TAG: '{{.FIBER_IMAGE_TAG | default "latest"}}'
    PLATFORM: '{{.PLATFORM | default "linux/amd64"}}'

tasks:
    build:
        desc: Build the fiber image
        cmds:
            - docker build --platform {{.PLATFORM}} --tag {{.REGISTRY_URL}}/{{.REGISTRY_NAMESPACE}}/fiber:{{.IMAGE_TAG}} --file {{.STACK_DIR}}/app/Dockerfile {{.STACK_DIR}}
    push:
        desc: Push the fiber image
        cmds:
            - docker push {{.REGISTRY_URL}}/{{.REGISTRY_NAMESPACE}}/fiber:{{.IMAGE_TAG}}
    publish:
        desc: Build and push
        cmds:
            - task: build
            - task: push
    test:
        desc: Run unit + integration + e2e suites
        cmds:
            - task: test:unit
            - task: test:integration
            - task: test:e2e
    test:unit:
        desc: Run the unit suite
        dir: "{{.STACK_DIR}}/app"
        cmds:
            - uv run pytest tests/unit -q
    test:integration:
        desc: Run integration tests (testcontainers; requires Docker)
        dir: "{{.STACK_DIR}}/app"
        cmds:
            - FIBER_INTEGRATION=1 uv run pytest tests/integration/test_dump_runner.py tests/integration/test_movement_e2e.py -v
    test:e2e:
        desc: Run Swarm end-to-end test (requires Docker with Swarm capability)
        cmds:
            - bash {{.STACK_DIR}}/tests/e2e/run-e2e.sh
    demo:
        desc: Boot the dashboard demo locally with seeded data (no cluster, scan loop disabled)
        dir: "{{.STACK_DIR}}/app"
        cmds:
            - PYTHONPATH=. uv run python tools/demo.py
