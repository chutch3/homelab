version: "3.8"

configs:
  e2e_seed_sql:
    file: ./seed.sql

secrets:
  e2e_db_password:
    external: true

networks:
  backups:
    external: true

volumes:
  e2e_bowl: {}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: e2e
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD_FILE: /run/secrets/e2e_db_password
    secrets:
      - e2e_db_password
    configs:
      - source: e2e_seed_sql
        target: /docker-entrypoint-initdb.d/seed.sql
    networks:
      - backups
    deploy:
      replicas: 1
      labels:
        - "fiber.enable=true"
        - "fiber.engine=postgres"
        - "fiber.dbname=e2e"
        - "fiber.user=e2e"
        - "fiber.secret=e2e_db_password"
        - "fiber.host=postgres"
        - "fiber.schedule=* * * * *"

  fiber:
    image: fiber:e2e
    environment:
      - FIBER_BOWL_PATH=/backups
      - FIBER_DB_PATH=/state/fiber.db
      - FIBER_DOCKER_HOST=unix:///var/run/docker.sock
      - FIBER_METRICS_PORT=9090
    volumes:
      - e2e_bowl:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - e2e_db_password
    networks:
      - backups
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
