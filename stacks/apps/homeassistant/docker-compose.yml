version: "3.9"

services:
    homeassistant:
        image: "ghcr.io/home-assistant/home-assistant:stable"
        volumes:
            - homeassistant:/config
            - /etc/localtime:/etc/localtime:ro
        restart: unless-stopped
        privileged: true
        healthcheck:
            test: "curl -m 90 -sLf http://0.0.0.0:8123 || date >> /config/healthcheck"
            interval: 90s
            timeout: 60s
            retries: 2
        networks:
            - traefik-public
        deploy:
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.homeassistant.rule=Host(`ha.${BASE_DOMAIN}`)"
                - "traefik.http.routers.homeassistant.entrypoints=websecure"
                - "traefik.http.routers.homeassistant.tls.certresolver=dns"
                - "traefik.http.services.homeassistant.loadbalancer.server.port=8123"
                - "traefik.http.routers.homeassistant.service=homeassistant"
                - homepage.group=Home
                - homepage.name=Home Assistant
                - homepage.icon=home-assistant.png
                - homepage.href=https://ha.${BASE_DOMAIN}
                - homepage.description=Home Automation
                - "traefik.http.routers.homeassistant-hubitat-events.rule=Host(`ha.${BASE_DOMAIN}`)"
                - "traefik.http.routers.homeassistant-hubitat-events.entrypoints=hubitat"
                - "traefik.http.routers.homeassistant-hubitat-events.tls=true" # Assuming TLS is desired for 8181
                - "traefik.http.routers.homeassistant-hubitat-events.tls.certresolver=dns"
                - "traefik.http.services.homeassistant-hubitat-events.loadbalancer.server.port=8123"
                - "traefik.http.routers.homeassistant-hubitat-events.service=homeassistant-hubitat-events"

    ha-mcp:
        image: "ghcr.io/homeassistant-ai/ha-mcp:7.7.0"
        command: ["ha-mcp-web"]
        environment:
            - HOMEASSISTANT_URL=http://homeassistant:8123
            - HOMEASSISTANT_TOKEN=${HA_MCP_TOKEN}
            # MCP endpoint auth is URL-path secrecy; never leave the default /mcp
            - MCP_SECRET_PATH=${HA_MCP_SECRET_PATH}
            # Persist tool_config.json / feature flags across restarts
            - HA_MCP_CONFIG_DIR=/data
            # Search mode OFF: expose tools DIRECTLY (the discover->proxy chaining
            # that search mode requires is too much for local models — they narrate
            # instead of calling). Catalog pruned to a focused inspect+edit set via
            # DISABLED_TOOLS so it fits the model's context window.
            - ENABLE_TOOL_SEARCH=false
            # Lean read+control set (~7K tokens). The verbose write tools
            # (ha_config_set_*) are ~2.5-3.3K tokens EACH — 24 tools blew past the
            # 24K context and truncated. Re-add write tools later once basic loop works.
            - DISABLED_TOOLS=ha_bulk_control,ha_call_event,ha_config_delete_dashboard,ha_config_delete_dashboard_resource,ha_config_get_calendar_events,ha_config_get_category,ha_config_get_label,ha_config_get_scene,ha_config_list_dashboard_resources,ha_config_list_groups,ha_config_list_helpers,ha_config_remove_automation,ha_config_remove_calendar_event,ha_config_remove_category,ha_config_remove_group,ha_config_remove_label,ha_config_remove_scene,ha_config_remove_script,ha_config_set_automation,ha_config_set_calendar_event,ha_config_set_category,ha_config_set_dashboard,ha_config_set_dashboard_resource,ha_config_set_group,ha_config_set_helper,ha_config_set_label,ha_config_set_scene,ha_config_set_script,ha_eval_template,ha_get_addon,ha_get_automation_traces,ha_get_blueprint,ha_get_camera_image,ha_get_device,ha_get_entity_exposure,ha_get_hacs_info,ha_get_history,ha_get_integration,ha_get_logs,ha_get_operation_status,ha_get_system_health,ha_get_todo,ha_get_updates,ha_get_zone,ha_import_blueprint,ha_list_floors_areas,ha_manage_addon,ha_manage_backup,ha_manage_energy_prefs,ha_manage_hacs,ha_manage_pipeline,ha_reload_core,ha_remove_area_or_floor,ha_remove_device,ha_remove_entity,ha_remove_helpers_integrations,ha_remove_todo_item,ha_remove_zone,ha_report_issue,ha_restart,ha_set_area_or_floor,ha_set_device,ha_set_entity,ha_set_integration_enabled,ha_set_todo_item,ha_set_zone
        volumes:
            - ha-mcp:/data
        restart: unless-stopped
        networks:
            - traefik-public
        deploy:
            labels:
                - "traefik.enable=true"
                - "traefik.swarm.network=traefik-public"
                - "traefik.http.routers.ha-mcp.rule=Host(`hamcp.${BASE_DOMAIN}`)"
                - "traefik.http.routers.ha-mcp.entrypoints=websecure"
                - "traefik.http.routers.ha-mcp.tls.certresolver=dns"
                - "traefik.http.services.ha-mcp.loadbalancer.server.port=8086"
                - "traefik.http.routers.ha-mcp.service=ha-mcp"

networks:
    traefik-public:
        external: true

volumes:
    homeassistant:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/app-data/homeassistant"
    ha-mcp:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "/mnt/iscsi/app-data/ha-mcp"
