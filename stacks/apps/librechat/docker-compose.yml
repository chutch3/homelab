version: "3.9"

services:
    api:
        image: ghcr.io/danny-avila/librechat-dev-api:latest
        environment:
            - HOST=0.0.0.0
            - NODE_ENV=production
            - MONGO_URI=mongodb://mongodb:27017/LibreChat
            - MEILI_HOST=http://meilisearch:7700
            - MEILI_MASTER_KEY=${LIBRECHAT_MEILI_MASTER_KEY}
            - RAG_PORT=${RAG_PORT:-8000}
            - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
            - JWT_SECRET=${LIBRECHAT_JWT_SECRET}
            - JWT_REFRESH_SECRET=${LIBRECHAT_JWT_REFRESH_SECRET}
            - CREDS_KEY=${LIBRECHAT_CREDS_KEY}
            - CREDS_IV=${LIBRECHAT_CREDS_IV}
            - ALLOW_SOCIAL_LOGIN=true
            - ALLOW_REGISTRATION=true
            - GROQ_API_KEY=${GROQ_API_KEY}
            - MISTRAL_API_KEY=${MISTRAL_API_KEY}
            - OPENROUTER_KEY=${OPENROUTER_KEY}
            - PORTKEY_API_KEY=${PORTKEY_API_KEY}
            - PORTKEY_OPENAI_VIRTUAL_KEY=${PORTKEY_OPENAI_VIRTUAL_KEY}
            - TTS_API_KEY=${TTS_API_KEY}
            - STT_API_KEY=${STT_API_KEY}
            - ANTHROPIC_API_KEY=${LIBRECHAT_ANTHROPIC_API_KEY}
            - OLLAMA_BASE_URL=http://ollama_ollama:11434
            - OLLAMA_DEFAULT_MODEL=${LIBRECHAT_OLLAMA_DEFAULT_MODEL}
            - ACTUAL_MCP_URL=${LIBRECHAT_ACTUAL_MCP_URL}
            - HOMEASSISTANT_MCP_URL=${LIBRECHAT_HOMEASSISTANT_MCP_URL}
            - HOMEASSISTANT_MCP_TOKEN=${LIBRECHAT_HOMEASSISTANT_API_TOKEN}
            - HAMCP_MCP_URL=${LIBRECHAT_HAMCP_MCP_URL}
            - OPENID_ISSUER=https://auth.${BASE_DOMAIN}/application/o/librechat/.well-known/openid-configuration
            - OPENID_CLIENT_ID=${LIBRECHAT_OAUTH_CLIENT_ID}
            - OPENID_CLIENT_SECRET=${LIBRECHAT_OAUTH_CLIENT_SECRET}
            - OPENID_SESSION_SECRET=${LIBRECHAT_OAUTH_SESSION_SECRET}
            - DOMAIN_SERVER=https://chat.${BASE_DOMAIN}
            - DOMAIN_CLIENT=https://chat.${BASE_DOMAIN}
            - OPENID_CALLBACK_URL=/oauth/openid/callback
            - OPENID_SCOPE=openid profile email
            - OPENID_BUTTON_LABEL=Login with Authentik
            - OPENID_IMAGE_URL=https://cdn.jsdelivr.net/gh/selfhst/icons/png/authentik.png
            - OPENID_GENERATE_NONCE=true
            - OPENID_USE_END_SESSION_ENDPOINT=true
        configs:
            - source: librechat_config_v10
              target: /app/librechat.yaml
        volumes:
            - librechat_images:/app/client/public/images
            - librechat_uploads:/app/uploads
            - librechat_logs:/app/api/logs
        networks:
            - traefik-public
        deploy:
            labels:
                - traefik.enable=true
                - traefik.http.routers.librechat.rule=Host(`chat.${BASE_DOMAIN}`)
                - traefik.http.routers.librechat.entrypoints=websecure
                - traefik.http.routers.librechat.tls.certresolver=dns
                - traefik.http.services.librechat.loadbalancer.server.port=3080
                - traefik.swarm.network=traefik-public
                - homepage.group=AI
                - homepage.name=LibreChat
                - homepage.icon=mdi-chat
                - homepage.href=https://chat.${BASE_DOMAIN}/
                - homepage.description=AI Chat Interface
            replicas: 1
        depends_on:
            - mongodb
            - meilisearch
            - vectordb
            - rag_api

    mongodb:
        image: nertworkweb/mongodb-no-avx
        restart: always
        user: "${UID}:${GID}"
        ports:
            - 27017:27017
        volumes:
            - librechat_mongodb:/data/db
        command: --noauth --bind_ip_all
        networks:
            - traefik-public
        deploy:
            replicas: 1
            placement:
                constraints:
                    # Centralized database node
                    - node.labels.database == true

    meilisearch:
        image: getmeili/meilisearch:v1.12.3
        environment:
            - MEILI_NO_ANALYTICS=true
            - MEILI_MASTER_KEY=${LIBRECHAT_MEILI_MASTER_KEY}
        volumes:
            - librechat_meilisearch:/meili_data
        networks:
            - traefik-public
        deploy:
            replicas: 1
            placement:
                constraints:
                    # Centralized database node
                    - node.labels.database == true

    vectordb:
        image: ankane/pgvector:latest
        environment:
            POSTGRES_DB: mydatabase
            POSTGRES_USER: myuser
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            PGDATA: /var/lib/postgresql/data/pgdata
        volumes:
            - librechat_vectordb:/var/lib/postgresql/data
        networks:
            - traefik-public
        deploy:
            replicas: 1
            placement:
                constraints:
                    # Centralized database node
                    - node.labels.database == true

    rag_api:
        image: ghcr.io/danny-avila/librechat-rag-api-dev:latest
        environment:
            - DB_HOST=vectordb
            - RAG_PORT=${RAG_PORT:-8000}
            - RAG_API_URL=http://host.docker.internal:8000
            - EMBEDDINGS_PROVIDER=ollama
            - OLLAMA_BASE_URL=http://host.docker.internal:11434
            - EMBEDDINGS_MODEL=nomic-embed-text
            - POSTGRES_DB=mydatabase
            - POSTGRES_USER=myuser
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        networks:
            - traefik-public
        deploy:
            replicas: 1
networks:
    traefik-public:
        external: true

configs:
    librechat_config_v10:
        file: ./librechat.yaml

volumes:
    librechat_mongodb:
        driver: local
        # Local storage on centralized database node for performance

    librechat_meilisearch:
        driver: local
        # Local storage on centralized database node for performance

    librechat_vectordb:
        driver: local
        # Local storage on centralized database node for performance

    librechat_logs:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,nobrl,uid=0,gid=100,file_mode=0777,dir_mode=0777,soft,actimeo=30"
            device: "//${NAS_SERVER}/librechat_logs"

    librechat_images:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,nobrl,uid=0,gid=100,file_mode=0777,dir_mode=0777,soft,actimeo=30"
            device: "//${NAS_SERVER}/librechat_images"

    librechat_uploads:
        driver: local
        driver_opts:
            type: "cifs"
            o: "username=${SMB_USERNAME},password=${SMB_PASSWORD},domain=${SMB_DOMAIN},vers=3.0,nobrl,uid=0,gid=100,file_mode=0777,dir_mode=0777,soft,actimeo=30"
            device: "//${NAS_SERVER}/librechat_uploads"
