# Create the swarm secret Fiber reads to dump this DB.
secrets:
  - name: librenms_db_password
    from_env: LIBRENMS_DB_PASSWORD

validate:
  env:
    - LIBRENMS_DB_PASSWORD
  labels:
    - database: "true"

# Data dirs on shared storage (created cluster-side by the preflight role).
# librenms db + redis run as uid/gid 999; the app data dir as 1000 (PUID/PGID).
directories:
  - { path: librenms/db, owner: 999, group: 999 }
  - { path: librenms/data, owner: 1000, group: 1000 }
  - { path: librenms-redis, base: cache, owner: 999, group: 999 }
