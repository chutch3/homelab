version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - traefik-public
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_DEBUG=1
      # Default num_ctx for all models; Ollama's 4096 default silently
      # truncates prompts that carry MCP tool definitions (~9K tokens)
      - OLLAMA_CONTEXT_LENGTH=24576
      # Pin loaded models in VRAM indefinitely. Without this Ollama unloads
      # after 5 min idle, forcing a full ~18GB reload from disk on the next
      # request (the dominant source of "slowness"). Model store is now on
      # local NVMe (see volume below), so it stays resident on the 3090.
      - OLLAMA_KEEP_ALIVE=-1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      replicas: 1
      placement:
        constraints:
          # `llm` label marks the LLM-inference node (currently the manager's
          # RTX 3090). To move Ollama, relocate the `llm` label in
          # ansible/inventory/02-hosts.yml and run `task ansible:cluster:update-labels`.
          - node.labels.llm == true
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ollama.rule=Host(`ollama.${BASE_DOMAIN}`)"
        - "traefik.http.routers.ollama.entrypoints=websecure"
        - "traefik.http.routers.ollama.tls.certresolver=dns"
        - "traefik.http.services.ollama.loadbalancer.server.port=11434"
        - "traefik.swarm.network=traefik-public"

        - "homepage.group=AI & Chat"
        - "homepage.name=Ollama"
        - "homepage.icon=ollama.png"
        - "homepage.href=https://ollama.${BASE_DOMAIN}/"
        - "homepage.description=Local LLM Runner"

networks:
  traefik-public:
    external: true

volumes:
  # Renamed from ollama-data (which was bound to iSCSI) to force Docker to create
  # a fresh volume on the new device — `docker stack deploy` never updates an
  # existing volume's driver_opts, so a rename is the clean way to repoint it.
  ollama-models:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      # Node-local NVMe on the manager (llm node), NOT shared iSCSI. Ollama is a
      # single-node service pinned via the `llm` label, so its model store has no
      # reason to live on slow shared OCFS2/iSCSI. /mnt/nvme is the dedicated
      # Samsung 970 EVO; see the migration note in the ollama README.
      device: "/mnt/nvme/ollama"
