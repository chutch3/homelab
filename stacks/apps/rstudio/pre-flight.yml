validate:
  env:
    - RSTUDIO_PASSWORD

# Data dirs on shared storage (created cluster-side by the preflight role, not a
# hooks.sh mkdir on the controller). rocker/rstudio runs as uid/gid 1000.
directories:
  - { path: rstudio, owner: 1000, group: 1000 }
  - { path: rstudio/R/library, owner: 1000, group: 1000 }
  # Shared with the code-server devbox — ensure they exist so rstudio can deploy
  # independently of code-server. Idempotent; shared-ssh must stay 0700 for SSH.
  - { path: dev-env/workspace, owner: 1000, group: 1000 }
  - { path: dev-env/shared-ssh, owner: 1000, group: 1000, mode: "0700" }
