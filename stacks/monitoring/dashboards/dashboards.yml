apiVersion: 1

providers:
  # Default provider for JSON dashboards from NAS
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true

  # Local dashboards (built-in, version-controlled)
  # Path is intentionally outside the 'default' NAS provider tree. If both
  # providers scan the same directory, Grafana detects duplicate UIDs and locks
  # both providers out of database write access, preventing new dashboards
  # from loading.
  - name: 'local'
    orgId: 1
    folder: 'Homelab'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards-local
