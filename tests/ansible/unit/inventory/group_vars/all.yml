---
# Stub vars that the preflight role depends on from the wider play context.
# become is disabled so --check runs don't prompt for sudo password.
ansible_become: false
# Same reason for the declarative `directories:` provisioning task — keep it
# unprivileged under --check so it never tries to escalate against a fake host.
preflight_provision_become: false
# Stage module temp files under /tmp so the template task doesn't depend on a
# writable HOME (CI/devbox shells can run as root with no /root/.ansible/tmp).
ansible_remote_tmp: /tmp/.ansible-preflight-test-tmp

# These allow --check dry-runs to render all templates without a real cluster.

swarm_docker_context: "test-context"
swarm_docker_host: "unix:///var/run/docker.sock"
swarm_use_ssh_client: false

swarm_env_vars:
  BASE_DOMAIN: "test.example.com"
  CLOUDFLARE_DNS_API_TOKEN: "test-token"
  REQUIRED_VAR_THAT_EXISTS: "set"
  # REQUIRED_VAR_THAT_IS_MISSING is intentionally absent — used by negative test
  SSH_KEY_FILE: "/tmp/test_key"
  GIT_AUTHOR_NAME: "Test User"
  GIT_AUTHOR_EMAIL: "test@example.com"
  STATUS_PIPELINE_MINIO_METRICS_TOKEN: "test-token"
  STATUS_PIPELINE_MINIO_HOST: "nas.test.example.com:9000"
  GRAFANA_ADMIN_PASSWORD: "test-password"
  DOWNLOADS_OPENVPN_PASSWORD: "test-password"
  DOWNLOADS_KENKU_DB_PASSWORD: "test-password"
  DOWNLOADS_KENKU_DB_USER: "kenku"
  DOWNLOADS_KENKU_DB_NAME: "kenku"
  EXCALIDRAW_DB_PASSWORD: "test-password"
  PRIMARY_DNS_API_KEY: "test-key"
  LIBRENMS_DB_PASSWORD: "test-password"
  TOR_WIREGUARD_PRIVATE_KEY: "test-key"
  TOR_WIREGUARD_ADDRESSES: "10.5.0.2/32"
  TOR_BROWSER_VNC_PASSWORD: "test-password"
  HA_MCP_TOKEN: "test-token"
  HA_MCP_SECRET_PATH: "/private_test"
  OPENWEBUI_SECRET_KEY: "test-secret"
  RSTUDIO_PASSWORD: "test-password"
